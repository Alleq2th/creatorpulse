// ── GROQ TEXT GENERATION ──────────────────────────────────────────────────────
async function groq(system, user) {
  if(!GROQ_KEY||GROQ_KEY==="YOUR_GROQ_KEY_HERE") throw new Error("Add your Groq API key at the top of index.html");
  const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+GROQ_KEY},
    body:JSON.stringify({model:"llama3-70b-8192",messages:[{role:"system",content:system},{role:"user",content:user}],max_tokens:1024,temperature:0.8})
  });
  const d = await r.json();
  if(d.error) throw new Error(d.error.message);
  return d.choices?.[0]?.message?.content||"";
}

// ── NEWSAPI ───────────────────────────────────────────────────────────────────
async function fetchNews(niche) {
  const q = NQ[niche]||NQ.default;
  if(!NEWS_KEY||NEWS_KEY==="YOUR_NEWS_KEY_HERE"){
    return getFallbackTrends(niche);
  }
  try {
    const r = await fetch(`https://newsapi.org/v2/everything?q=${encodeURIComponent(q)}&sortBy=publishedAt&pageSize=6&language=en&apiKey=${NEWS_KEY}`);
    const d = await r.json();
    if(d.status!=="ok"||!d.articles?.length) return getFallbackTrends(niche);
    return d.articles.map((a,i)=>({
      id:niche.replace(/\W/g,"_")+"_"+i,
      niche, headline:a.title,
      summary:a.description||"",
      image:a.urlToImage||null,
      source:a.source?.name||"",
      score:Math.floor(Math.random()*12)+86,
      tags:[niche.split("/")[0], a.source?.name||"News"].slice(0,3)
    }));
  } catch(e){ return getFallbackTrends(niche); }
}

async function getSportsImg(name, type="player") {

    const r = await fetch(ep);
    const d = await r.json();
    if(type==="player") return d.player?.[0]?.strThumb||d.player?.[0]?.strCutout||null;
    return d.teams?.[0]?.strTeamBadge||null;
  } catch(e){ return null; }
}

async function getWikiImg(name) {
  try {
    const r = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(name)}`);
    const d = await r.json();
    return d.thumbnail?.source||null;
  } catch(e){ return null; }
}

// ── LOAD SUBJECT IMAGE FROM HEADLINE ─────────────────────────────────────────
async function getSubjectImg(headline, niche) {
  const words = headline.split(" ");
  const proper = words.filter(w=>w.length>3&&w[0]===w[0].toUpperCase()&&isNaN(w[0]));
  const subject = proper.slice(0,2).join(" ");
  if(!subject) return null;
  const isSport = ["Football","Soccer","Basketball","Tennis","Cricket","Boxing","MMA","Formula","NFL","NBA","Premier","Champions"].some(k=>niche.includes(k)||headline.includes(k));
  let img = null;
  if(isSport){
    img = await getSportsImg(subject,"player");
    if(!img) img = await getSportsImg(subject,"team");
  }
  if(!img) img = await getWikiImg(subject);
  if(!img) return null;
  return new Promise(resolve=>{
    const el=new Image();el.crossOrigin="anonymous";
    el.onload=()=>resolve(el);el.onerror=()=>resolve(null);
    el.src=img;setTimeout(()=>resolve(null),6000);
  });
}

// ── CANVAS IMAGE GENERATION ───────────────────────────────────────────────────
function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

function makeCanvas(headline, subImg, slideNum, total, accent, channel, W, H) {
  const cv=document.createElement("canvas");cv.width=W;cv.height=H;
  const ctx=cv.getContext("2d");
  // BG
  const bg=ctx.createLinearGradient(0,0,W,H);bg.addColorStop(0,"#060810");bg.addColorStop(.6,"#0d1525");bg.addColorStop(1,"#180828");ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // Glow
  const g1=ctx.createRadialGradient(W*.85,H*.12,0,W*.85,H*.12,W*.5);g1.addColorStop(0,accent+"48");g1.addColorStop(1,"transparent");ctx.fillStyle=g1;ctx.fillRect(0,0,W,H);
  // Grid
  ctx.strokeStyle="rgba(255,255,255,0.022)";ctx.lineWidth=1;
  for(let i=0;i<W;i+=64){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,H);ctx.stroke();}
  for(let i=0;i<H;i+=64){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(W,i);ctx.stroke();}
  // Subject image — right half
  if(subImg){
    try{
      ctx.save();ctx.globalAlpha=0.88;
      const iw=W*0.52,ih=H*0.72,ix=W*0.44,iy=H*0.06;
      ctx.drawImage(subImg,ix,iy,iw,ih);ctx.restore();
      // fade overlay so text is readable
      const ov=ctx.createLinearGradient(W*0.4,0,W,0);
      ov.addColorStop(0,"rgba(6,8,16,.96)");ov.addColorStop(.35,"rgba(6,8,16,.55)");ov.addColorStop(1,"rgba(6,8,16,.08)");
      ctx.fillStyle=ov;ctx.fillRect(0,0,W,H);
    }catch(e){}
  }
  // Top bar
  const tb=ctx.createLinearGradient(0,0,W,0);tb.addColorStop(0,accent);tb.addColorStop(.5,accent+"AA");tb.addColorStop(1,"transparent");ctx.fillStyle=tb;ctx.fillRect(0,0,W,8);
  // Header strip
  ctx.fillStyle="rgba(0,0,0,.6)";ctx.fillRect(0,0,W,88);
  ctx.fillStyle="rgba(255,255,255,.9)";ctx.font="bold 26px Arial";ctx.fillText("CREATORPULSE",70,54);
  // Slide counter
  if(total>1){
    ctx.fillStyle=accent;rr(ctx,W-180,16,162,50,10);ctx.fill();
    ctx.fillStyle="white";ctx.font="bold 21px Arial";ctx.textAlign="center";ctx.fillText(slideNum+" / "+total,W-99,47);ctx.textAlign="left";
    // Dots
    const dw=15,dg=20,dt=total*dg-5,sx=(W-dt)/2;
    for(let i=0;i<total;i++){ctx.fillStyle=i===slideNum-1?accent:"rgba(255,255,255,.2)";rr(ctx,sx+i*dg,72,dw,5,3);ctx.fill();}
  }
  // Left accent bar
  const lb=ctx.createLinearGradient(0,140,0,H-90);lb.addColorStop(0,accent);lb.addColorStop(.7,accent+"77");lb.addColorStop(1,"transparent");ctx.fillStyle=lb;ctx.fillRect(52,140,7,H-250);
  // Headline
  const words=headline.toUpperCase().split(" ");const lines=[];let cur="";const mx=total>1?13:16;
  for(const w of words){const t=cur?cur+" "+w:w;if(t.length>mx){lines.push(cur);cur=w;}else cur=t;}if(cur)lines.push(cur);
  const fs=lines.length<=2?106:lines.length<=3?86:lines.length<=4?70:58;
  ctx.shadowColor="rgba(0,0,0,.95)";ctx.shadowBlur=24;ctx.shadowOffsetX=4;ctx.shadowOffsetY=4;
  ctx.font="900 "+fs+"px Arial";let y=210;
  for(let i=0;i<Math.min(lines.length,5);i++){ctx.fillStyle=i===0?accent:"white";ctx.fillText(lines[i],70,y);y+=fs+10;}
  ctx.shadowColor="transparent";
  // Accent underline
  const ul=ctx.createLinearGradient(70,y+10,70+360,y+10);ul.addColorStop(0,accent);ul.addColorStop(1,"transparent");ctx.fillStyle=ul;ctx.fillRect(70,y+12,360,5);
  // Bottom bar
  ctx.fillStyle="rgba(0,0,0,.65)";ctx.fillRect(0,H-70,W,70);
  ctx.fillStyle=accent;ctx.fillRect(0,H-7,W,7);
  ctx.fillStyle="rgba(255,255,255,.55)";ctx.font="bold 22px Arial";ctx.fillText("@"+(channel||"CREATORPULSE").toUpperCase(),60,H-24);
  ctx.fillStyle="rgba(255,255,255,.2)";ctx.font="16px Arial";ctx.textAlign="right";ctx.fillText("Made with CreatorPulse",W-48,H-24);ctx.textAlign="left";
  return cv.toDataURL("image/png");
}

function makeThumbnail(headline, subImg, channel, accent) {
  const W=1280,H=720,cv=document.createElement("canvas");cv.width=W;cv.height=H;
  const ctx=cv.getContext("2d");
  const bg=ctx.createLinearGradient(0,0,W,H);bg.addColorStop(0,"#04060e");bg.addColorStop(.5,"#0d1525");bg.addColorStop(1,"#1a0830");ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // Subject image left
  if(subImg){
    try{ctx.save();ctx.globalAlpha=0.9;ctx.drawImage(subImg,-10,0,600,H);ctx.restore();
    const fade=ctx.createLinearGradient(380,0,620,0);fade.addColorStop(0,"transparent");fade.addColorStop(1,"rgba(4,6,14,1)");ctx.fillStyle=fade;ctx.fillRect(380,0,240,H);}
    catch(e){}
  } else {
    ctx.fillStyle="rgba(255,255,255,.03)";ctx.fillRect(0,0,560,H);
    ctx.fillStyle="rgba(255,255,255,.06)";ctx.font="bold 13px Arial";ctx.textAlign="center";ctx.fillText("[ ADD SUBJECT PHOTO ]",280,H/2);ctx.fillText("Replace in Canva/Photoshop",280,H/2+20);ctx.textAlign="left";
  }

  const rg=ctx.createRadialGradient(W*.82,H*.22,0,W*.82,H*.22,500);rg.addColorStop(0,accent+"55");rg.addColorStop(1,"transparent");ctx.fillStyle=rg;ctx.fillRect(0,0,W,H);
  // Divider
  const dv=ctx.createLinearGradient(568,0,582,H);dv.addColorStop(0,"transparent");dv.addColorStop(.2,accent);dv.addColorStop(.8,accent);dv.addColorStop(1,"transparent");ctx.fillStyle=dv;ctx.fillRect(568,0,12,H);
  // Headline
  const words=headline.toUpperCase().split(" ");const lines=[];let cur="";
  for(const w of words){const t=cur?cur+" "+w:w;if(t.length>10){lines.push(cur);cur=w;}else cur=t;}if(cur)lines.push(cur);
  const fs=lines.length<=2?124:lines.length<=3?96:78;
  ctx.shadowColor="rgba(0,0,0,.96)";ctx.shadowBlur=28;ctx.shadowOffsetX=5;ctx.shadowOffsetY=5;
  let y=185;
  for(let i=0;i<Math.min(lines.length,4);i++){ctx.fillStyle=i===0?accent:"white";ctx.font="900 "+fs+"px Arial";ctx.fillText(lines[i],600,y);y+=fs+10;}
  ctx.shadowColor="transparent";
  const ul=ctx.createLinearGradient(600,y+8,600+500,y+8);ul.addColorStop(0,accent);ul.addColorStop(1,"transparent");ctx.fillStyle=ul;ctx.fillRect(600,y+10,500,6);
  ctx.fillStyle="rgba(255,255,255,.55)";ctx.font="bold 27px Arial";ctx.fillText((channel||"YOUR CHANNEL").toUpperCase(),600,y+50);
  ctx.fillStyle=accent;rr(ctx,W-195,25,168,56,10);ctx.fill();
  ctx.fillStyle="white";ctx.font="bold 21px Arial";ctx.textAlign="center";ctx.fillText("WATCH NOW",W-111,60);ctx.textAlign="left";
  ctx.fillStyle="rgba(255,255,255,.25)";ctx.font="16px Arial";ctx.fillText("Made with CreatorPulse AI",600,H-15);
  return cv.toDataURL("image/png");
}

      <div style="font-size:9px;color:var(--mu);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.8px">Platform</div>
      <div class="ptabs">${ptabs}</div>
      <div style="font-size:9px;color:var(--mu);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.8px">Content Type</div>
      <div class="ctps">${cts}</div>
      <div class="gr2">
        <button class="btn bp bsm gen-btn" data-tid="${t.id}" ${isL?"disabled":""}>${isL?`<span class="sp"></span> Generating...`:"⚡ Generate"}</button>
        <button class="btn bg2 bsm gen-all-btn" data-tid="${t.id}" ${isL?"disabled":""}>All ${PLATS.find(p=>p.id===ap)?.label} Formats</button>
      </div>
      ${isL?`<div class="lr"><span class="sp"></span><span>CreatorPulse AI is crafting your content...</span></div>`:""}
      <div class="oa">${outsH}</div>
    </div>`;
  }
  return`<div class="tc ${isE?"exp":""}" id="tc-${t.id}">
    <div class="th" data-tid="${t.id}">
      ${imgEl}
      <span class="rb">${t.score}</span>
      <span class="ntb" style="background:${nc}22;color:${nc};border:1px solid ${nc}44">${t.niche}</span>
      <div style="flex:1">
        <div class="hl">${t.headline}</div>
        <div class="tmeta">
          <span class="tsc">🔥 ${t.score} viral</span>
          ${(t.tags||[]).slice(0,2).map(tg=>`<span class="ttg">${tg}</span>`).join("")}
          ${t.source?`<span class="ttg">${t.source}</span>`:""}
        </div>
      </div>
      <span class="cv ${isE?"open":""}">▼</span>
    </div>
    ${panel}
  </div>`;
}

function renderOut(o){
  if(!o)return"";
  if(o.type==="carousel"){
    const imgs=(o.images||[]).map((img,i)=>`<div style="margin-bottom:9px"><img src="${img}" class="gi"/><div class="ia"><button class="btn bp bxs dl-btn" data-url="${img}" data-name="carousel-slide-${i+1}.png">⬇ Download Slide ${i+1}</button></div></div>`).join("");
    const sts=(o.slides||[]).map(s=>`<div class="sld"><div class="sn">Slide ${s.slideNum} of ${o.slides.length}</div><div class="st2">${s.title}</div><div class="sbd">${s.body}</div></div>`).join("");
    const cp=(o.slides||[]).map(s=>`SLIDE ${s.slideNum}: ${s.title}\n${s.body}`).join("\n\n");
    return`<div class="oc"><div class="oh"><span class="ol">📱 IG Carousel (${o.slides?.length||0} slides)</span><button class="cb" data-copy="${encodeURIComponent(cp)}">Copy Text</button></div>${imgs?`<div class="iw">${imgs}</div>`:""}<div class="slds">${sts}</div></div>`;
  }
  if(o.type==="thumbnail"){
    return`<div class="oc"><div class="oh"><span class="ol">🖼️ YouTube Thumbnail</span></div><div class="iw"><img src="${o.img}" class="gi"/><div class="ia"><button class="btn bp bxs dl-btn" data-url="${o.img}" data-name="thumbnail.png">⬇ Download PNG (1280×720)</button>${!o.hasRealFace?`<span class="ino">Add real subject photo in Canva</span>`:""}</div></div></div>`;
  }
  if(o.type==="noface"){
    return`<div class="oc"><div class="oh"><span class="ol">🎵 TikTok No-Face Graphic</span><button class="cb" data-copy="${encodeURIComponent(o.hook+"\n\n"+o.caption)}">Copy</button></div><div class="iw"><img src="${o.img}" class="gi"/><div class="ia"><button class="btn bp bxs dl-btn" data-url="${o.img}" data-name="tiktok-graphic.png">⬇ Download Graphic (1080×1080)</button></div></div><div class="hbl"><div class="hlb">🪝 Hook Text — show on screen</div><div class="htx">${o.hook}</div></div><div class="hbl"><div class="hlb">📝 Caption + Hashtags</div><div style="font-size:12px;line-height:1.7;white-space:pre-wrap">${o.caption}</div></div></div>`;
  }
  return`<div class="oc"><div class="oh"><span class="ol">${o.label||""}</span><button class="cb" data-copy="${encodeURIComponent(o.content||"")}">Copy</button></div><div class="ob">${(o.content||"").replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div></div>`;
}

function renderCal(){
  const now=new Date(),today=now.getDate(),isCur=now.getMonth()===CAL_M&&now.getFullYear()===CAL_Y;
  const first=new Date(CAL_Y,CAL_M,1).getDay(),days=new Date(CAL_Y,CAL_M+1,0).getDate();
  const em={3:[{t:"post",x:"Post due"}],7:[{t:"event",x:"Niche event"},{t:"post",x:"Post"}],10:[{t:"reminder",x:"Reminder"}],14:[{t:"post",x:"Mid-week"},{t:"event",x:"Industry"}],18:[{t:"reminder",x:"Weekly recap"}],22:[{t:"event",x:"Major event"}],26:[{t:"post",x:"End of week"}]};
  if(isCur)em[today]=[{t:"reminder",x:"Post today!"},{t:"post",x:"Trending now"}];
  const cells=[];for(let i=0;i<first;i++)cells.push(null);for(let d=1;d<=days;d++)cells.push(d);
  const cellsH=cells.map(d=>{if(!d)return`<div class="cc"></div>`;const isTod=isCur&&d===today,evs=(em[d]||[]).map(e=>`<div class="cev ${e.t}">${e.x}</div>`).join("");return`<div class="cc ${isTod?"td":""}"><div class="cdt ${isTod?"tod":""}">${d}</div>${evs}</div>`;}).join("");
  const mo=MONTHS[CAL_M];
  const up=[
    {date:"Today",name:"Live Trending Stories Ready",type:USER.niches[0]||"Your niche"},
    {date:"Tomorrow",name:"Scheduled Content Drop",type:"Your Schedule"},
    {date:mo.slice(0,3)+" "+String(Math.min(today+3,days)).padStart(2,"0"),name:"Post Reminder",type:"Calendar"},
    {date:mo.slice(0,3)+" "+String(Math.min(today+7,days)).padStart(2,"0"),name:"Weekly Recap",type:"Automated"},
    {date:mo.slice(0,3)+" "+String(Math.min(today+10,days)).padStart(2,"0"),name:"Niche Alert",type:USER.niches[1]||USER.niches[0]||"Trending"},
  ];
  return`<div class="cal">
    <div class="cgw">
      <div class="ch2"><div class="cm">${MONTHS[CAL_M]} ${CAL_Y}</div><div class="cn"><button id="cal-prev">&#8249;</button><button id="cal-next">&#8250;</button></div></div>
      <div class="cday">${DAYS.map(d=>`<div class="cdl2">${d}</div>`).join("")}</div>
      <div class="ccel">${cellsH}</div>
    </div>
    <div class="cbot">
      <div class="cbc">
        <div class="stit" style="font-size:13px;margin-bottom:11px">📌 Upcoming</div>
        ${up.map(e=>`<div class="upi"><div class="upd">${e.date}</div><div class="upn">${e.name}</div><div class="upt">${e.type}</div></div>`).join("")}
      </div>
      <div class="cbc">
        <div class="stit" style="font-size:13px;margin-bottom:9px">📋 Schedule</div>
        <div style="font-size:12px;color:var(--mu);margin-bottom:11px">${USER.postsPerDay}x per day · <strong style="color:var(--tx)">${USER.postsPerDay*7}/week</strong></div>
        <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px">
          ${USER.niches.map(n=>`<div style="display:flex;align-items:center;gap:7px;font-size:11px"><div style="width:9px;height:9px;border-radius:50%;background:${gc(n)};flex-shrink:0"></div>${n}</div>`).join("")}
        </div>
        <div style="background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.2);border-radius:var(--rs);padding:9px 11px;font-size:10px;color:var(--a2)">✦ Google Calendar sync — coming soon</div>
      </div>
    </div>
  </div>`;
}

        <div><label style="font-size:9px;color:var(--mu);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.8px;font-weight:600">Active Niches</label>

          ✓ Live news from 130+ niches via NewsAPI<br>

          ✓ AI text via Groq (Llama 3 70B — free)<br>

// ── BIND ──────────────────────────────────────────────────────────────────────
function bindApp(){
  document.querySelectorAll(".ni[data-tab]").forEach(el=>el.addEventListener("click",()=>{TAB=el.dataset.tab;render();bindApp();}));
  document.getElementById("cal-prev")?.addEventListener("click",()=>{if(CAL_M===0){CAL_M=11;CAL_Y--;}else CAL_M--;render();bindApp();});
  document.getElementById("cal-next")?.addEventListener("click",()=>{if(CAL_M===11){CAL_M=0;CAL_Y++;}else CAL_M++;render();bindApp();});
  document.getElementById("refresh-btn")?.addEventListener("click",()=>{ALL_TRENDS=[];render();bindApp();loadTrends();});
  document.getElementById("bell-btn")?.addEventListener("click",e=>{e.stopPropagation();NOTIF_OPEN=!NOTIF_OPEN;render();bindApp();});
  document.addEventListener("click",()=>{if(NOTIF_OPEN){NOTIF_OPEN=false;render();bindApp();}},{once:true});
  document.querySelectorAll(".th[data-tid]").forEach(el=>el.addEventListener("click",async()=>{
    const tid=el.dataset.tid;EXP[tid]=!EXP[tid];
    if(EXP[tid]&&!AP[tid])AP[tid]=USER.primaryPlatform;
    if(EXP[tid]&&!AT[tid])AT[tid]=PTYPES[USER.primaryPlatform]?.[0]||"";
    render();bindApp();
    if(EXP[tid]&&!RECS[tid]){
      const t=ALL_TRENDS.find(x=>x.id===tid);
      if(t){
        try{const rec=await groq("Give a one-sentence content recommendation. Direct, specific, no preamble.",`Niches: ${USER.niches.join(", ")}. Story: "${t.headline}". Best platform and format?`);RECS[tid]=rec;}
        catch(e){RECS[tid]="Generate content for this story to see recommendations.";}
        render();bindApp();
      }
    }
  }));
  document.querySelectorAll(".ptab[data-tid]").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();AP[el.dataset.tid]=el.dataset.pid;AT[el.dataset.tid]=PTYPES[el.dataset.pid]?.[0]||"";render();bindApp();}));
  document.querySelectorAll(".ctp[data-tid]").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();AT[el.dataset.tid]=el.dataset.ct;render();bindApp();}));
  document.querySelectorAll(".gen-btn").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();gen(el.dataset.tid,false);}));
  document.querySelectorAll(".gen-all-btn").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();gen(el.dataset.tid,true);}));
  document.querySelectorAll(".cb[data-copy]").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();navigator.clipboard.writeText(decodeURIComponent(el.dataset.copy));el.textContent="✓ Copied";el.classList.add("copied");setTimeout(()=>{el.textContent="Copy";el.classList.remove("copied");},2000);}));
  document.querySelectorAll(".dl-btn").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();const a=document.createElement("a");a.href=el.dataset.url;a.download=el.dataset.name;document.body.appendChild(a);a.click();document.body.removeChild(a);}));
}

// ── GENERATE ──────────────────────────────────────────────────────────────────
async function gen(tid, all){
  const t=ALL_TRENDS.find(x=>x.id===tid);if(!t)return;
  const ap=AP[tid]||USER.primaryPlatform,at=AT[tid]||PTYPES[ap]?.[0]||"",accent=gc(t.niche);
  LOAD[tid]=true;OUTS[tid]=[];render();bindApp();
  try{
    const types=all?(PTYPES[ap]||[]):[at];
    const res=[];
    // Load real subject image from headline
    const subImg=await getSubjectImg(t.headline,t.niche);
    for(const ct of types){
      if(ct==="IG Carousel"){
        let sc=5;
        try{const cr=await groq('Return ONLY valid JSON: {"slideCount":number}',`Story: "${t.headline}". Recommend Instagram carousel slide count 3-7.`);sc=JSON.parse(cr).slideCount||5;}catch{}
        let slides=[];
        try{const sr=await groq(`Return ONLY a valid JSON array of ${sc} objects: [{"slideNum":1,"title":"bold hook","body":"2-3 punchy sentences"}]. No markdown.`,`Create a ${sc}-slide viral Instagram carousel for ${t.niche} creator. Story: "${t.headline}". Summary: ${t.summary}`);slides=JSON.parse(sr);}
        catch{slides=[{slideNum:1,title:t.headline,body:t.summary||""}];}
        const images=slides.map((s,i)=>makeCanvas(s.title||t.headline,subImg,i+1,slides.length,accent,USER.name,1080,1080));
        const cap=await groq(SYS,`Instagram caption + 10 hashtags for ${t.niche} carousel: "${t.headline}". Punchy, ready to post.`);
        res.push({type:"carousel",slides,images});
        res.push({type:"text",label:"📝 Caption + Hashtags",content:cap});
      } else if(ct==="Thumbnail"){
        let hl=t.headline.toUpperCase().split(" ").slice(0,5).join(" ");
        try{const tr=await groq('Return ONLY valid JSON: {"headline":"MAX 6 WORDS ALL CAPS SHOCKING"}',`${t.niche}: "${t.headline}". World-class YouTube thumbnail headline. MrBeast level.`);hl=JSON.parse(tr).headline||hl;}catch{}
        res.push({type:"thumbnail",img:makeThumbnail(hl,subImg,USER.name,accent),hasRealFace:!!subImg});
      } else if(ct==="TikTok No-Face Graphic"){
        const hook=await groq(SYS,"TikTok hook text. MAX 6 WORDS. ALL CAPS. Shocking or curiosity-driving. Return ONLY the hook, nothing else.");
        const cap=await groq(SYS,`TikTok caption + 6 hashtags for ${t.niche}: "${t.headline}". Ready to post.`);
        res.push({type:"noface",hook:hook.trim(),caption:cap,img:makeCanvas(hook.trim()||t.headline,subImg,1,1,accent,USER.name,1080,1080)});
      } else if(ct==="TikTok Script"){
        let ld={length:"short",targetSeconds:30,reason:"Quick punchy take works best"};
        try{const lr=await groq('Return ONLY valid JSON: {"length":"short","targetSeconds":30,"reason":"one sentence"}',`${t.niche}: "${t.headline}". Best TikTok video length?`);ld=JSON.parse(lr);}catch{}
        const s=await groq(SYS,`${ld.length==="long"?"60-90 second":"15-30 second"} TikTok script for ${t.niche}. Topic: "${t.headline}". [HOOK 3sec], [BODY], [CTA]. Viral and platform-native.`);
        res.push({type:"text",label:`🎵 TikTok Script (${ld.length==="long"?"Long":"Short"} ~${ld.targetSeconds}s) — ${ld.reason}`,content:s});
      } else if(ct==="Documentary Script"){
        const s=await groq(SYS,`YouTube documentary script for ${t.niche}. Topic: "${t.headline}". Cold open, Act 1 background, Act 2 conflict/drama, Act 3 analysis+what's next, Outro+CTA. ~800 words. [B-ROLL SUGGESTION] markers. Cinematic and emotional.`);
        res.push({type:"text",label:"🎬 Documentary Script",content:s});
      } else if(ct==="Long Form Script"){
        const s=await groq(SYS,`Full YouTube long-form script for ${t.niche}. Topic: "${t.headline}". Hook, Intro, 3-4 main sections, Conclusion, CTA. ~900 words. Engaging and specific.`);
        res.push({type:"text",label:"▶️ Long Form Script",content:s});
      } else if(ct==="YouTube Short Script"){
        const s=await groq(SYS,`60 second YouTube Short script for ${t.niche}. Topic: "${t.headline}". Hook in first 3 seconds, strong CTA at end.`);
        res.push({type:"text",label:"▶️ YouTube Short Script",content:s});
      } else if(ct==="Title + Description"){
        const s=await groq(SYS,`3 YouTube title options + full SEO description with timestamps for ${t.niche}. Topic: "${t.headline}". Titles: clickbait level. Description: keywords + hashtags.`);
        res.push({type:"text",label:"▶️ Title + Description",content:s});
      } else if(ct==="Thread (5 tweets)"){
        const s=await groq(SYS,`Viral 5-tweet X/Twitter thread for ${t.niche}. Topic: "${t.headline}". Format each: "Tweet 1/5: [text]". Max 280 chars each. Punchy, controversial. Last tweet: strong CTA.`);
        res.push({type:"text",label:"𝕏 Twitter Thread",content:s});
      } else if(ct==="IG Reel Script"){
        const s=await groq(SYS,`30-60 second Instagram Reel script for ${t.niche}. Topic: "${t.headline}". [HOOK],[BODY],[CTA]. Viral energy, platform-native.`);
        res.push({type:"text",label:"📸 IG Reel Script",content:s});
      } else {
        const p=PLATS.find(x=>x.id===ap);
        const s=await groq(SYS,`"${ct}" for ${t.niche} creator on ${p?.label||ap}. Story: "${t.headline}". Summary: ${t.summary}. Viral, platform-native, ready to post.`);
        res.push({type:"text",label:`${p?.icon||""} ${ct}`,content:s});
      }
    }
    OUTS[tid]=res;
  } catch(e){
    OUTS[tid]=[{type:"text",label:"Error",content:"Generation failed: "+e.message+"\n\nMake sure your Groq API key is set at the top of index.html"}];
  }
  LOAD[tid]=false;render();bindApp();
}

render();
</script>
