<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>CreatorPulse — AI Content Engine</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#7C3AED">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060810;
  --sf:rgba(12,17,32,0.92);
  --s2:rgba(17,24,39,0.7);
  --br:rgba(255,255,255,0.06);
  --pr:#7C3AED;
  --pl:#A855F7;
  --ac:#F97316;
  --a2:#06B6D4;
  --tx:#F1F5F9;
  --mu:rgba(148,163,184,0.8);
  --gr:#10B981;
  --r:14px;
  --rs:8px;
  --shadow:0 8px 32px rgba(0,0,0,0.4);
  --tab-height:64px;
}
body{
  background:var(--bg);
  color:var(--tx);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  padding-bottom:var(--tab-height);
  background-image: radial-gradient(ellipse at 20% 50%, rgba(124,58,237,0.06) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 20%, rgba(249,115,22,0.04) 0%, transparent 50%);
  background-attachment:fixed;
}
.app{max-width:480px;margin:0 auto;position:relative;min-height:100vh}
.page{display:none;padding:12px 14px 80px;animation:fadeIn 0.25s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 0 12px;
  border-bottom:1px solid var(--br)
}
.topbar-left h1{
  font-family:'Inter',sans-serif;
  font-size:18px;
  font-weight:800;
  letter-spacing:-0.3px;
  background:linear-gradient(135deg,var(--pl),var(--ac));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.topbar-left p{font-size:11px;color:var(--mu);-webkit-text-fill-color:var(--mu)}
.topbar-right{display:flex;gap:6px;align-items:center}
.btn{
  padding:6px 12px;
  border-radius:var(--rs);
  border:none;
  cursor:pointer;
  font-size:11px;
  font-weight:600;
  transition:all 0.2s;
  font-family:'Inter',sans-serif;
  display:inline-flex;
  align-items:center;
  gap:4px
}
.bp{
  background:linear-gradient(135deg,var(--pr),var(--pl));
  color:#fff;
  box-shadow:0 4px 16px rgba(124,58,237,0.25)
}
.bp:hover:not(:disabled){transform:translateY(-1px)}
.bs{
  background:rgba(255,255,255,0.04);
  color:var(--tx);
  border:1px solid var(--br)
}
.bs:hover:not(:disabled){background:rgba(255,255,255,0.08)}
.bsm{padding:4px 10px;font-size:10px}
.bg2{
  background:transparent;
  color:var(--mu);
  border:1px solid var(--br)
}
.bg2:hover:not(:disabled){border-color:var(--pr);color:var(--pl)}
.card{
  background:var(--sf);
  backdrop-filter:blur(20px);
  border:1px solid var(--br);
  border-radius:var(--r);
  padding:14px;
  margin-bottom:10px
}
.card-title{font-size:14px;font-weight:600;margin-bottom:6px}
.card-sub{font-size:11px;color:var(--mu)}
.tab-bar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:var(--sf);
  backdrop-filter:blur(20px);
  border-top:1px solid var(--br);
  display:flex;
  justify-content:space-around;
  align-items:center;
  height:var(--tab-height);
  padding-bottom:env(safe-area-inset-bottom);
  z-index:100;
  max-width:480px;
  margin:0 auto
}
.tab-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:none;
  border:none;
  color:var(--mu);
  font-size:9px;
  font-weight:500;
  cursor:pointer;
  transition:color 0.2s;
  padding:4px 6px;
  font-family:'Inter',sans-serif;
  position:relative
}
.tab-item .icon{font-size:20px;margin-bottom:1px}
.tab-item.active{color:var(--pl)}
.tab-item .badge{
  position:absolute;
  top:0;right:-2px;
  background:var(--ac);
  color:#fff;
  font-size:8px;
  font-weight:700;
  width:16px;height:16px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center
}
.tab-item:active{transform:scale(0.95)}
.stats-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin:8px 0
}
.stat-card{
  background:rgba(255,255,255,0.02);
  border:1px solid var(--br);
  border-radius:var(--rs);
  padding:10px;
  text-align:center
}
.stat-number{font-size:18px;font-weight:700;color:var(--tx)}
.stat-label{font-size:8px;color:var(--mu);margin-top:2px;text-transform:uppercase;letter-spacing:0.4px}
.platform-btn{
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 12px;
  background:rgba(255,255,255,0.02);
  border:1px solid var(--br);
  border-radius:var(--rs);
  cursor:pointer;
  transition:all 0.2s;
  width:100%;
  margin-bottom:6px;
  color:var(--tx);
  font-family:'Inter',sans-serif;
  font-size:12px
}
.platform-btn:hover{background:rgba(255,255,255,0.05)}
.platform-btn .picon{font-size:20px;width:28px;text-align:center}
.platform-btn .pname{flex:1;font-weight:500}
.platform-btn .pstatus{font-size:9px;color:var(--mu)}
.progress-bar{
  height:4px;
  background:rgba(255,255,255,0.04);
  border-radius:99px;
  overflow:hidden;
  margin:4px 0
}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--pr),var(--pl));
  border-radius:99px;
  transition:width 0.5s
}
.editor-placeholder{text-align:center;padding:30px 16px;color:var(--mu)}
.editor-placeholder .big-icon{font-size:40px;margin-bottom:12px}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:99px}
@media(min-width:768px){.app{max-width:600px;padding-top:12px}}

/* ── News Cards ── */
.tlist{display:flex;flex-direction:column;gap:6px}
.tc{
  background:var(--sf);
  backdrop-filter:blur(20px);
  border:1px solid var(--br);
  border-radius:var(--r);
  overflow:hidden;
  transition:border-color 0.2s
}
.tc.exp{border-color:rgba(124,58,237,0.3)}
.th{
  padding:10px 12px;
  cursor:pointer;
  display:flex;
  align-items:flex-start;
  gap:10px;
  transition:background 0.15s
}
.th:hover{background:rgba(255,255,255,0.01)}
.trend-img{
  width:48px;height:48px;
  border-radius:8px;
  object-fit:cover;
  flex-shrink:0;
  background:var(--s2);
  border:1px solid var(--br)
}
.trend-img-placeholder{
  width:48px;height:48px;
  border-radius:8px;
  flex-shrink:0;
  background:var(--s2);
  border:1px solid var(--br);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px
}
.rb{
  background:rgba(249,115,22,0.12);
  border:1px solid rgba(249,115,22,0.2);
  color:var(--ac);
  font-size:9px;
  font-weight:700;
  padding:1px 6px;
  border-radius:99px;
  white-space:nowrap;
  flex-shrink:0;
  margin-top:1px
}
.ntb{
  font-size:9px;
  padding:1px 6px;
  border-radius:99px;
  margin-left:2px;
  font-weight:600;
  flex-shrink:0;
  margin-top:1px
}
.hl{font-size:13px;font-weight:600;line-height:1.4;letter-spacing:-0.2px;word-wrap:break-word;overflow-wrap:break-word;word-break:normal}
.tmeta{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}
.ttg{
  font-size:8px;
  padding:1px 6px;
  border-radius:99px;
  background:rgba(255,255,255,0.04);
  color:var(--mu)
}
.tsc{
  font-size:8px;
  padding:1px 6px;
  border-radius:99px;
  background:rgba(16,185,129,0.1);
  color:var(--gr);
  font-weight:600
}
.cv{
  font-size:10px;
  color:var(--mu);
  margin-left:4px;
  transition:transform 0.2s;
  flex-shrink:0;
  margin-top:2px
}
.cv.open{transform:rotate(180deg)}
.cp{
  border-top:1px solid var(--br);
  padding:10px 12px;
  background:rgba(0,0,0,0.15)
}
.sb2{
  font-size:11px;
  color:var(--mu);
  line-height:1.6;
  margin-bottom:8px;
  padding:8px 10px;
  background:rgba(255,255,255,0.02);
  border-radius:var(--rs);
  border-left:3px solid var(--pr)
}
.ar{
  background:rgba(124,58,237,0.06);
  border:1px solid rgba(124,58,237,0.12);
  border-radius:var(--rs);
  padding:6px 10px;
  font-size:11px;
  color:var(--pl);
  margin-bottom:8px;
  display:flex;
  gap:6px;
  align-items:flex-start;
  line-height:1.5
}
.ptabs,.ctps{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.ptab,.ctp{
  padding:4px 10px;
  border-radius:99px;
  border:1px solid var(--br);
  font-size:9px;
  cursor:pointer;
  transition:all 0.15s;
  background:transparent;
  color:var(--mu);
  font-family:'Inter',sans-serif
}
.ptab:hover{border-color:var(--pr);color:var(--tx)}
.ptab.active{
  background:linear-gradient(135deg,var(--pr),var(--pl));
  border-color:var(--pr);
  color:#fff;font-weight:600
}
.ctp:hover{color:var(--tx);border-color:var(--mu)}
.ctp.active{
  border-color:var(--ac);
  color:var(--ac);
  background:rgba(249,115,22,0.06)
}
.gr2{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
.oa{display:flex;flex-direction:column;gap:4px}
.oc{
  background:rgba(255,255,255,0.02);
  border:1px solid var(--br);
  border-radius:var(--r);
  overflow:hidden
}
.oh{
  padding:6px 10px;
  border-bottom:1px solid var(--br);
  display:flex;
  align-items:center;
  justify-content:space-between
}
.ol{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.6px;color:var(--pl)}
.cb{
  padding:2px 8px;
  border-radius:var(--rs);
  border:1px solid var(--br);
  background:transparent;
  color:var(--mu);
  font-size:8px;
  cursor:pointer;
  transition:all 0.15s;
  font-family:'Inter',sans-serif
}
.cb:hover{border-color:var(--gr);color:var(--gr)}
.ob{padding:10px;font-size:11px;line-height:1.7;color:var(--tx);white-space:pre-wrap}
.output-footer{
  padding:4px 10px;
  border-top:1px solid var(--br);
  display:flex;
  justify-content:flex-end;
  gap:4px
}
.bell-wrap{position:relative;cursor:pointer}
.bell-btn{
  padding:4px 8px;
  border-radius:var(--rs);
  border:1px solid var(--br);
  background:transparent;
  color:var(--mu);
  font-size:16px;
  cursor:pointer
}
.bell-btn:hover{border-color:var(--pr)}
.bell-dot{
  position:absolute;
  top:1px;right:1px;
  width:7px;height:7px;
  background:var(--ac);
  border-radius:50%;
  border:2px solid var(--sf);
  display:none
}
.bell-dot.show{display:block}
.notif-dropdown{
  position:absolute;
  top:34px;right:0;
  width:260px;
  background:var(--sf);
  backdrop-filter:blur(20px);
  border:1px solid var(--br);
  border-radius:var(--r);
  box-shadow:var(--shadow);
  z-index:100;
  display:none;
  padding:8px
}
.notif-dropdown.open{display:block}
.notif-item{padding:6px 0;border-bottom:1px solid var(--br)}
.notif-item:last-child{border-bottom:none}
.notif-niche{font-size:8px;font-weight:700;text-transform:uppercase;color:var(--ac)}
.notif-hl{font-size:11px;font-weight:600;margin-top:2px}
.notif-time{font-size:9px;color:var(--mu)}
.notif-empty{padding:8px;text-align:center;color:var(--mu);font-size:11px}
.lr{display:flex;align-items:center;gap:6px;padding:8px 0;color:var(--mu);font-size:11px}
.sp{
  width:12px;height:12px;
  border:2px solid rgba(255,255,255,0.05);
  border-top-color:var(--pr);
  border-radius:50%;
  animation:spin 0.7s linear infinite;
  display:inline-block
}
@keyframes spin{to{transform:rotate(360deg)}}
.stit{
  font-weight:700;
  font-size:15px;
  margin-bottom:10px;
  letter-spacing:-0.2px
}
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:12px}
.loading-screen.hide{display:none}
.pchip{
  padding:2px 8px;
  border-radius:99px;
  font-size:8px;
  font-weight:700;
  background:rgba(16,185,129,0.1);
  color:var(--gr);
  border:1px solid rgba(16,185,129,0.1)
}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center;font-size:11px}
.cal-day{font-size:9px;color:var(--mu);font-weight:600;padding:4px 0}
.cal-cell{padding:4px 0;border-radius:4px;position:relative}
.cal-cell .day-num{font-size:12px;font-weight:400;color:var(--mu);width:26px;height:26px;display:flex;align-items:center;justify-content:center;margin:0 auto;border-radius:50%}
.cal-cell.today .day-num{background:var(--pr);color:#fff;font-weight:700}
.cal-cell.has-event .day-num{color:var(--pl)}
.cal-event-dot{width:5px;height:5px;border-radius:50%;background:var(--pl);margin:1px auto}
.events-list .event-item{padding:4px 0;border-bottom:1px solid var(--br);font-size:12px}
.events-list .event-item:last-child{border-bottom:none}
.events-list .event-date{font-size:9px;color:var(--ac);font-weight:600}
.events-list .event-title{font-weight:500}
</style>
</head>
<body>

<div class="loading-screen" id="loading-screen">
  <div style="width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--pr),var(--ac));display:flex;align-items:center;justify-content:center;font-size:22px">⚡</div>
  <div style="font-family:'Inter',sans-serif;font-size:18px;font-weight:800">Creator<span style="color:var(--pl)">Pulse</span></div>
  <div class="sp sp-lg" style="width:28px;height:28px;border-width:2px"></div>
  <div style="color:var(--mu);font-size:12px">Loading...</div>
</div>

<div class="app" id="app">

  <!-- HOME PAGE -->
  <div class="page active" id="page-home">
    <div class="topbar">
      <div class="topbar-left">
        <h1>⚡ CreatorPulse</h1>
        <p id="live-status">Live · <span id="story-count">0</span> stories</p>
      </div>
      <div class="topbar-right">
        <button class="btn bs bsm" id="refresh-btn">⟳</button>
        <div class="bell-wrap">
          <button class="bell-btn" id="bell-btn">🔔</button>
          <span class="bell-dot" id="bell-dot"></span>
          <div class="notif-dropdown" id="notif-dd"></div>
        </div>
        <span class="pchip">✦ Free</span>
      </div>
    </div>
    <div id="home-content"></div>
  </div>

  <!-- CALENDAR PAGE -->
  <div class="page" id="page-calendar">
    <div class="topbar">
      <div class="topbar-left"><h1>📅 Calendar</h1><p>Your schedule + events</p></div>
    </div>
    <div id="calendar-content"></div>
  </div>

  <!-- SAVED PAGE -->
  <div class="page" id="page-saved">
    <div class="topbar">
      <div class="topbar-left"><h1>📂 Saved</h1><p>Content library</p></div>
    </div>
    <div id="saved-content"></div>
  </div>

  <!-- PROFILE PAGE -->
  <div class="page" id="page-profile">
    <div class="topbar">
      <div class="topbar-left"><h1>👤 Profile</h1><p>Your stats</p></div>
      <div class="topbar-right">
        <button class="btn bs bsm" id="logout-btn">Logout</button>
      </div>
    </div>
    <div id="profile-content"></div>
  </div>

  <!-- EDIT PAGE -->
  <div class="page" id="page-edit">
    <div class="topbar">
      <div class="topbar-left"><h1>🎬 Edit</h1><p>Video editor (coming soon)</p></div>
    </div>
    <div id="edit-content">
      <div class="editor-placeholder">
        <div class="big-icon">🎥</div>
        <h2 style="font-size:16px;font-weight:700;margin-bottom:6px">Video Editor</h2>
        <p style="font-size:12px;line-height:1.5">Record, trim, captions, and export to social.</p>
        <button class="btn bp" style="margin-top:14px" disabled>Coming Soon</button>
      </div>
    </div>
  </div>

  <!-- TAB BAR -->
  <div class="tab-bar" id="tab-bar">
    <button class="tab-item active" data-tab="home"><span class="icon">🏠</span>Home</button>
    <button class="tab-item" data-tab="calendar"><span class="icon">📅</span>Calendar</button>
    <button class="tab-item" data-tab="saved"><span class="icon">📂</span>Saved</button>
    <button class="tab-item" data-tab="profile"><span class="icon">👤</span>Profile</button>
    <button class="tab-item" data-tab="edit"><span class="icon">🎬</span>Edit</button>
  </div>
</div>

<script>
// ── FULL APP SCRIPT ──────────────────────────────────────────────────────────
const NICHES={"Sports":["Football/Soccer","Basketball","Tennis","Cricket","Formula 1","Boxing","MMA/UFC","WWE Wrestling","American Football","Baseball","Ice Hockey","Golf","Rugby","Athletics/Track","Cycling","Swimming","Esports","Volleyball"],"Entertainment":["Celebrity Gossip","Music (Afrobeats)","Music (Hip-Hop)","Music (Pop)","Music (R&B)","Music (K-Pop)","Music (Amapiano)","Movies & TV","Anime","Korean Drama","Bollywood","Pop Culture"],"Gaming":["Console Gaming","PC Gaming","Mobile Gaming","Game Reviews","Twitch Streaming","YouTube Gaming","Speedrunning"],"Lifestyle":["Travel","Food & Recipes","Fitness & Gym","Mental Health","Relationships & Dating","Parenting","Minimalism","Home Decor","Pets"],"Fashion & Beauty":["Streetwear","Luxury Fashion","Skincare","Makeup","Haircare","Nails","Thrift & Vintage","Men's Fashion"],"Finance":["Personal Finance","Crypto","Stock Market","Side Hustles","Business News","Real Estate","Budgeting"],"Tech":["AI & Tech News","Gadget Reviews","Coding & Dev Life","Startups","Cybersecurity","Space & Science"],"Education":["Science","History","Language Learning","Productivity","Study Tips","Philosophy","Psychology"],"Talk & Commentary":["Yapping Videos","Hot Takes","Rants","Storytelling","Political Commentary","True Crime","Mystery & Unexplained"],"Dance & Trends":["Viral Dances","Trend Reaction","Challenge Content"],"Creator Meta":["YouTube Growth","Social Media Tips","Brand Deals","Monetization Advice"],"Professional":["Medicine & Health","Law","Marketing","Entrepreneurship","Motivational Speaking","HR & Careers"],"Culture":["Faith & Religion","African Culture","Caribbean Culture","Astrology","Self-Development"]};
const PLATS=[{id:"tiktok",label:"TikTok",icon:"🎵"},{id:"instagram",label:"Instagram",icon:"📸"},{id:"youtube",label:"YouTube",icon:"▶️"},{id:"twitter",label:"X/Twitter",icon:"𝕏"},{id:"facebook",label:"Facebook",icon:"👍"},{id:"linkedin",label:"LinkedIn",icon:"💼"}];
const PTYPES={tiktok:["TikTok Script","TikTok No-Face Graphic","Caption + Hashtags"],instagram:["IG Reel Script","IG Carousel","Caption + Hashtags"],youtube:["Long Form Script","YouTube Short Script","Title + Description","Thumbnail","Documentary Script"],twitter:["Hot Take Tweet","Engagement Tweet","Thread (5 tweets)"],facebook:["Long-Form Post","Engagement Post"],linkedin:["Thought Leadership","Professional Update"]};
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const NC={"Football/Soccer":"#00D4FF","Basketball":"#FF6B35","Tennis":"#00FF87","Cricket":"#F59E0B","Formula 1":"#EF4444","Boxing":"#EC4899","MMA/UFC":"#8B5CF6","Music (Afrobeats)":"#FF6B35","Music (Hip-Hop)":"#A855F7","Music (K-Pop)":"#EC4899","Music (Amapiano)":"#F97316","Celebrity Gossip":"#F472B6","Movies & TV":"#06B6D4","Anime":"#8B5CF6","Crypto":"#F59E0B","Stock Market":"#10B981","Streetwear":"#FF2D78","Skincare":"#F472B6","Console Gaming":"#9B59B6","Mobile Gaming":"#7C3AED","AI & Tech News":"#00B4D8","default":"#7C3AED"};
function gc(n){return NC[n]||NC.default}

const API = window.location.origin;

async function fetchNews(niche) {
  const r = await fetch(`${API}/api/news?niche=${encodeURIComponent(niche)}&_=${Date.now()}`, { cache:'no-store' });
  const d = await r.json();

  }
  function renderCalendarWithEvents(events) {
    const eventsByDate = {};
    events.forEach(e => { const d = new Date(e.date).getDate(); if(!eventsByDate[d]) eventsByDate[d]=[]; eventsByDate[d].push(e); });
    let html = `<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-weight:700;font-size:15px">${MONTHS[CAL_M]} ${CAL_Y}</span><div><button class="btn bs bsm" id="cal-prev">‹</button><button class="btn bs bsm" id="cal-next">›</button></div></div><div class="cal-grid">`;
    DAYS.forEach(d => html += `<div class="cal-day">${d}</div>`);
    for(let i=0;i<first;i++) html += `<div></div>`;
    for(let d=1; d<=days; d++) {
      const isTod = isCur && d===today;
      const hasPost = postsByDate[d] && postsByDate[d].length > 0;
      const hasEvent = eventsByDate[d] && eventsByDate[d].length > 0;
      const cls = `cal-cell ${isTod?'today':''} ${(hasPost||hasEvent)?'has-event':''}`;
      html += `<div class="${cls}"><div class="day-num">${d}</div>${(hasPost||hasEvent)?'<div class="cal-event-dot"></div>':''}</div>`;
    }
    html += `</div></div>`;
    // Upcoming events
    html += `<div class="card"><div class="card-title">📌 Upcoming Events</div>`;
    if(events.length === 0 && SCHEDULE_DATA.length === 0) {
      html += `<div style="font-size:12px;color:var(--mu)">No events or scheduled posts.</div>`;
    } else {
      // combine events + saved posts
      const combined = [...events.map(e => ({ date:e.date, title:e.title, type:'event', desc:e.description })), ...SCHEDULE_DATA.map(p => ({ date:p.scheduled_date, title:p.headline, type:'post', desc:p.niche }))];
      combined.sort((a,b) => new Date(a.date) - new Date(b.date));
      combined.slice(0,6).forEach(item => {
        html += `<div class="event-item"><div class="event-date">${item.date || 'Draft'}</div><div class="event-title">${item.type === 'event' ? '📅 ' : '📌 '}${item.title}</div><div style="font-size:10px;color:var(--mu)">${item.desc || ''}</div></div>`;
      });
    }
    html += `</div>`;
    container.innerHTML = html;
    document.getElementById("cal-prev")?.addEventListener("click", ()=>{ if(CAL_M===0){CAL_M=11;CAL_Y--;}else CAL_M--; loadSchedule(); renderCalendar(); });
    document.getElementById("cal-next")?.addEventListener("click", ()=>{ if(CAL_M===11){CAL_M=0;CAL_Y++;}else CAL_M++; loadSchedule(); renderCalendar(); });
  }
  // Initial render without events, then update
  renderCalendarWithEvents([]);
  // fetch and update
  if(USER && USER.niches) {
    Promise.all(USER.niches.map(n => fetchEvents(n))).then(results => {
      let all = [];
      results.forEach(ev => all = all.concat(ev));
      renderCalendarWithEvents(all);
    });
  }
}

// ── Toggle card ──
async function toggleCard(tid) {
  EXP[tid] = !EXP[tid];
  if(EXP[tid] && !AP[tid]) AP[tid] = USER?.primaryPlatform || "instagram";
  if(EXP[tid] && !AT[tid]) AT[tid] = PTYPES[AP[tid]]?.[0] || "";
  renderHome();
  if(EXP[tid] && !RECS[tid]) {
    const t = ALL_TRENDS.find(x => x.id === tid);
    if(t) {
      try {
        const rec = await generateText("Give a one-sentence content recommendation. Direct, specific, no preamble.", `Niches: ${USER?.niches?.join(", ")}. Story: "${t.headline}". Best platform and format?`);
        RECS[tid] = rec;
        renderHome();
      } catch(e) {}
    }
  }
}

// ── Generate ──
async function gen(tid, all) {
  const t = ALL_TRENDS.find(x => x.id === tid);
  if(!t) return;
  const ap = AP[tid] || USER?.primaryPlatform || "instagram";
  const at = AT[tid] || PTYPES[ap]?.[0] || "";
  LOAD[tid] = true;
  OUTS[tid] = [];
  renderHome();
  try {
    const types = all ? (PTYPES[ap] || []) : [at];
    const res = [];
    const subjectImg = await loadSubjectImage(t.headline, t.niche, t.image);
    for(const ct of types) {
      if(ct === "IG Carousel") {
        let sc=5;
        try { const cr=await generateText('Return ONLY valid JSON: {"slideCount":number}', `Story: "${t.headline}". Recommend carousel slide count 3-7.`); const parsed=extractJSON(cr); if(parsed) sc=parsed.slideCount||5; } catch(e) {}
        let slides=[];
        try { const sr=await generateText(`Return ONLY a valid JSON array of ${sc} objects: [{"slideNum":1,"title":"bold hook","body":"2-3 punchy sentences"}]. No markdown.`, `Create a ${sc}-slide viral Instagram carousel for ${t.niche} creator. Story: "${t.headline}". Summary: ${t.summary}`); const parsed=extractJSON(sr); if(parsed) slides = Array.isArray(parsed) ? parsed : [parsed]; else slides = JSON.parse(sr); } catch(e) { slides=[{slideNum:1,title:t.headline,body:t.summary||""}]; }
        const images = slides.map((s,i) => makeGraphicCanvas(s.title||t.headline, subjectImg, i+1, slides.length, gc(t.niche), USER?.name));
        const cap = await generateText(SYS, `Instagram caption + 10 hashtags for ${t.niche} carousel: "${t.headline}". Punchy, ready to post.`);
        res.push({type:"carousel", slides, images});
        res.push({type:"text", label:"📝 Caption + Hashtags", content:cap});
      } else if(ct === "Thumbnail") {
        let hl = t.headline.toUpperCase().split(" ").slice(0,5).join(" ");
        try { const tr=await generateText('Return ONLY valid JSON: {"headline":"YOUR HEADLINE HERE"}', `Niche: ${t.niche}. Story: "${t.headline}". Write YouTube thumbnail headline (max 6 words, ALL CAPS).`); const parsed=extractJSON(tr); if(parsed && parsed.headline) hl=parsed.headline; } catch(e) {}
        res.push({type:"thumbnail", img:makeThumbnailCanvas(hl, subjectImg, USER?.name, gc(t.niche))});
      } else if(ct === "TikTok No-Face Graphic") {
        const hook = await generateText("You are a viral TikTok hook writer. Return ONLY the hook text (max 6 words, ALL CAPS, exclamation marks allowed).", `Story: "${t.headline}". Niche: ${t.niche}. Write the perfect TikTok hook.`);
        const cap = await generateText(SYS, `TikTok caption + 6 hashtags for ${t.niche}: "${t.headline}". Ready to post.`);
        res.push({type:"noface", hook:hook.trim(), caption:cap, img:makeGraphicCanvas(hook.trim()||t.headline, subjectImg, 1, 1, gc(t.niche), USER?.name)});
      } else if(ct === "TikTok Script") {
        let ld = {length:"short", targetSeconds:30, reason:"Quick punchy take"};
        try { const lr=await generateText('Return ONLY valid JSON: {"length":"short","targetSeconds":30,"reason":"one sentence"}', `${t.niche}: "${t.headline}". Best TikTok length?`); const parsed=extractJSON(lr); if(parsed) ld=parsed; } catch(e) {}
        const s = await generateText(SYS, `Write a ${ld.length==="long"?"60-90 second":"15-30 second"} TikTok script for a ${t.niche} creator about: "${t.headline}". Start with hook, flow naturally, end with CTA. No headers, bullets, or labels.`);
        res.push({type:"text", label:`🎵 TikTok Script (${ld.length==="long"?"Long":"Short"} ~${ld.targetSeconds}s)`, content:s});
      } else {
        const p = PLATS.find(x => x.id === ap);
        const s = await generateText(SYS, `Write a "${ct}" for a ${t.niche} creator on ${p?.label||ap} about: "${t.headline}". ${t.summary}. Return ONLY the plain ready-to-post text.`);
        res.push({type:"text", label:`${p?.icon||""} ${ct}`, content:s});
      }
    }
    OUTS[tid] = res;
    if(res.length > 0 && USER && AUTH_TOKEN) {
      const first = res[0];
      let contentType = "Script";
      if(first.type === "carousel") contentType = "Carousel";
      else if(first.type === "thumbnail") contentType = "Thumbnail";
      else if(first.type === "noface") contentType = "Graphic";
      const today = new Date();
      const scheduledDate = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
      try {
        await fetch(`${API}/api/save-post`, {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({
            token:AUTH_TOKEN,
            headline:t.headline,
            niche:t.niche,
            platform:ap,
            contentType:contentType,
            content:first,
            scheduledDate:scheduledDate
          })
        });
        showToast("✅ Saved!");
        loadSchedule(); loadSavedPosts();
      } catch(e) {}
    }
  } catch(e) {
    OUTS[tid] = [{type:"text", label:"Error", content:"Generation failed: "+(e.message||"Unknown error")}];
  }
  LOAD[tid] = false;
  renderHome();
}

async function saveOutputToCalendar(tid, idx) {
  const t = ALL_TRENDS.find(x => x.id === tid);
  if(!t) return;
  const output = OUTS[tid]?.[idx];
  if(!output) return;
  const ap = AP[tid] || USER?.primaryPlatform || "instagram";
  let contentType = "Script";
  if(output.type === "carousel") contentType = "Carousel";
  else if(output.type === "thumbnail") contentType = "Thumbnail";
  else if(output.type === "noface") contentType = "Graphic";
  const today = new Date();
  const scheduledDate = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  try {
    const res = await fetch(`${API}/api/save-post`, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        token:AUTH_TOKEN,
        headline:t.headline,
        niche:t.niche,
        platform:ap,
        contentType:contentType,
        content:output,
        scheduledDate:scheduledDate
      })
    });
    const data = await res.json();
    if(data.success) { showToast("✅ Saved!"); loadSchedule(); loadSavedPosts(); if(TAB==="saved") renderSaved(); }
    else { showToast("❌ Save failed"); }
  } catch(e) { showToast("❌ Error saving"); }
}

function switchTab(tab) {
  TAB = tab;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+tab)?.classList.add('active');
  document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
  document.querySelector(`.tab-item[data-tab="${tab}"]`)?.classList.add('active');
  if(tab === 'home') { loadAllTrends(); loadNotifications(); }
  if(tab === 'calendar') { loadSchedule(); renderCalendar(); }
  if(tab === 'saved') { loadSavedPosts(); renderSaved(); }
  if(tab === 'profile') { renderProfile(); }
}

function init() {
  const loading = document.getElementById('loading-screen');
  if(loading) loading.classList.add('hide');
  const restored = restoreSession();
  if(restored) {
    AUTH_MODE = "app";
    loadAllTrends();
    loadNotifications();
    loadSchedule();
    loadSavedPosts();
    switchTab('home');
    setInterval(() => {
      if(AUTH_MODE === "app") {
        loadAllTrends();
        loadNotifications();
        if(TAB === "calendar") { loadSchedule(); renderCalendar(); }
        if(TAB === "saved") loadSavedPosts();
      }
    }, 30 * 60 * 1000); // every 30 minutes
  } else {
    // Quick dummy for testing – replace with real auth
    USER = { name: "Test Creator", email: "test@example.com", niches: ["Football/Soccer", "Movies & TV"], platforms: ["instagram","youtube"], primaryPlatform: "instagram", postsPerDay: 3 };
    AUTH_TOKEN = "dummy";
    AUTH_MODE = "app";
    saveSession(AUTH_TOKEN, USER);
    loadAllTrends();
    loadNotifications();
    loadSchedule();
    loadSavedPosts();
    switchTab('home');
    showToast("⚡ Test mode");
  }

  document.querySelectorAll('.tab-item').forEach(btn => {
    btn.addEventListener('click', function() { switchTab(this.dataset.tab); });
  });

  document.getElementById('refresh-btn')?.addEventListener('click', () => {
    showToast("⟳ Refreshing...");
    loadAllTrends();
    loadNotifications();
  });

  document.getElementById('bell-btn')?.addEventListener('click', (e) => {
    e.stopPropagation();
    NOTIF_OPEN = !NOTIF_OPEN;
    const dd = document.getElementById('notif-dd');
    if(dd) {
      dd.classList.toggle('open');
      if(NOTIF_OPEN) {
        let items = NOTIFICATIONS.length ? NOTIFICATIONS.map(n => `<div class="notif-item"><div class="notif-niche">${n.niche}</div><div class="notif-hl">${n.headline}</div><div class="notif-time">${n.time}</div></div>`).join('') : '<div class="notif-empty">No notifications</div>';
        dd.innerHTML = items;
        dd.style.display = 'block';
      } else {
        dd.style.display = 'none';
      }
    }
  });
  document.addEventListener('click', function closeDD(e) {
    if(!e.target.closest('.bell-wrap')) {
      const dd = document.getElementById('notif-dd');
      if(dd) { dd.style.display = 'none'; NOTIF_OPEN = false; }
    }
  });

  document.getElementById('logout-btn')?.addEventListener('click', () => {
    if(confirm("Log out?")) { clearSession(); location.reload(); }
  });
}

document.addEventListener('DOMContentLoaded', init);
