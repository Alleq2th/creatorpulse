<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>CreatorPulse — Content engine for creators</title>
<meta name="description" content="Trending stories, scripts, thumbnails, and a schedule that actually thinks. Built for creators across 130+ niches."/>
<meta name="theme-color" content="#0A0A0F"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0F;
  --sf:#141420;
  --sf2:#1c1c2b;
  --br:rgba(255,255,255,0.08);
  --br2:rgba(255,255,255,0.14);
  --tx:#F5F5F7;
  --mu:#8C8D9A;
  --mu2:#5E5F6B;
  --ac:#7C3AED;      /* purple primary */
  --ac2:#9F67FF;
  --pk:#EC4899;
  --or:#F97316;
  --danger:#EF4444;
  --ok:#4ADE80;
  --grad-num:linear-gradient(135deg,#F97316 0%,#EC4899 100%);
  --grad-av:linear-gradient(135deg,#7C3AED 0%,#F97316 100%);
  --tab-h:64px;
  --r:14px;
  --rs:10px;
  --serif:'Fraunces',Georgia,serif;
  --sans:'Inter','SF Pro Text',system-ui,sans-serif;
}
html,body{background:var(--bg);color:var(--tx);font-family:var(--sans);min-height:100vh;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{padding-bottom:var(--tab-h);letter-spacing:-0.005em}
.app{max-width:520px;margin:0 auto;min-height:100vh;position:relative;background:var(--bg)}
@media(min-width:900px){
  body{background:linear-gradient(180deg,#0A0A0F 0%,#0d0d15 100%)}
  .app{max-width:560px;box-shadow:0 0 0 1px var(--br),0 40px 80px rgba(0,0,0,0.4)}
}
.page{display:none;padding:20px 20px 100px;animation:fade .25s ease}
.page.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* icons */
.icon{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.icon-sm{width:14px;height:14px}
.icon-lg{width:22px;height:22px}

/* topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 0 20px;border-bottom:1px solid var(--br);margin-bottom:20px}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:32px;height:32px;border-radius:9px;background:var(--tx);color:var(--bg);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:700;font-size:19px;line-height:1;letter-spacing:-0.03em}
.brand-name{font-family:var(--serif);font-weight:600;font-size:20px;letter-spacing:-0.02em}
.brand-sub{font-size:11px;color:var(--mu);margin-top:1px;letter-spacing:0}
.topbar-right{display:flex;gap:6px;align-items:center}
.iconbtn{width:34px;height:34px;border-radius:10px;background:transparent;border:1px solid var(--br);color:var(--mu);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.iconbtn:hover{color:var(--tx);border-color:var(--br2)}
.iconbtn:active{transform:scale(.95)}
.bell-wrap{position:relative}
.bell-dot{position:absolute;top:6px;right:6px;width:6px;height:6px;background:var(--ac);border-radius:50%;display:none}
.bell-dot.show{display:block}
.notif-dd{position:absolute;top:44px;right:0;width:280px;background:var(--sf);border:1px solid var(--br2);border-radius:var(--r);box-shadow:0 20px 40px rgba(0,0,0,.5);z-index:100;display:none;padding:6px;max-height:340px;overflow-y:auto}
.notif-dd.open{display:block}
.notif-item{padding:10px;border-bottom:1px solid var(--br)}
.notif-item:last-child{border-bottom:none}
.notif-niche{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--ac);letter-spacing:.5px}
.notif-hl{font-size:12px;font-weight:500;margin-top:3px;line-height:1.4}
.notif-time{font-size:10px;color:var(--mu);margin-top:2px}
.notif-empty{padding:16px;text-align:center;color:var(--mu);font-size:12px}

/* section headings */
.sec-h{display:flex;align-items:baseline;justify-content:space-between;margin:14px 0 18px}
.sec-h h2{font-family:var(--serif);font-size:24px;font-weight:600;letter-spacing:-0.02em;line-height:1.1}
.sec-h .sec-meta{font-size:11px;color:var(--mu)}

/* buttons */
.btn{padding:9px 14px;border-radius:9px;border:1px solid transparent;cursor:pointer;font:600 12px/1 var(--sans);transition:all .15s;display:inline-flex;align-items:center;gap:6px;letter-spacing:.01em}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.bp{background:var(--tx);color:var(--bg)}
.bp:hover:not(:disabled){background:#fff}
.bs{background:var(--sf);color:var(--tx);border-color:var(--br)}
.bs:hover:not(:disabled){border-color:var(--br2)}
.bo{background:transparent;color:var(--mu);border-color:var(--br)}
.bo:hover:not(:disabled){color:var(--tx);border-color:var(--br2)}
.bac{background:var(--ac);color:#fff}
.bac:hover:not(:disabled){background:var(--ac2)}
.bsm{padding:6px 10px;font-size:11px}
.bxs{padding:4px 8px;font-size:10px}

/* trending card */
.tlist{display:flex;flex-direction:column;gap:14px}
.tc{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);overflow:hidden;transition:border-color .2s}
.tc.exp{border-color:var(--br2)}
.th{padding:14px;cursor:pointer;display:flex;gap:12px;align-items:flex-start}
.timg{width:56px;height:56px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--sf2);border:1px solid var(--br)}
.timg-ph{width:56px;height:56px;border-radius:8px;flex-shrink:0;background:linear-gradient(135deg,var(--sf2),var(--sf));border:1px solid var(--br);display:flex;align-items:center;justify-content:center;color:var(--mu2)}
.thead{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
.tmeta-top{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;letter-spacing:.4px;text-transform:uppercase;line-height:1.5}
.badge-hot{background:rgba(232,90,44,.12);color:var(--ac);border:1px solid rgba(232,90,44,.25)}
.badge-niche{background:rgba(255,255,255,.04);color:var(--mu);border:1px solid var(--br)}
.badge-src{background:transparent;color:var(--mu2);font-weight:500}
.thl{font-family:var(--serif);font-size:15px;font-weight:600;line-height:1.35;letter-spacing:-0.015em;color:var(--tx)}
.tmeta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;font-size:10px;color:var(--mu)}
.tsep{color:var(--mu2)}
.cv{color:var(--mu);transition:transform .2s;margin-top:2px}
.cv.open{transform:rotate(180deg)}

/* card panel */
.cp{border-top:1px solid var(--br);padding:14px;background:rgba(0,0,0,.15)}
.sb{font-size:12px;color:var(--mu);line-height:1.6;margin-bottom:12px;padding:10px 12px;background:rgba(255,255,255,.02);border-radius:8px;border-left:2px solid var(--ac)}
.rec{background:rgba(255,255,255,.03);border:1px solid var(--br);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--tx);margin-bottom:12px;line-height:1.5}
.rec-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ac);margin-bottom:3px}

.chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.chip-label{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:6px}
.chip{padding:5px 11px;border-radius:99px;border:1px solid var(--br);font:500 10px/1.5 var(--sans);cursor:pointer;background:transparent;color:var(--mu);transition:all .15s}
.chip:hover{color:var(--tx);border-color:var(--br2)}
.chip.active{background:var(--tx);color:var(--bg);border-color:var(--tx);font-weight:600}
.chip.ac.active{background:var(--ac);color:#fff;border-color:var(--ac)}

/* output */
.oa{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.oc{background:rgba(255,255,255,.02);border:1px solid var(--br);border-radius:8px;overflow:hidden}
.oh{padding:8px 12px;border-bottom:1px solid var(--br);display:flex;justify-content:space-between;align-items:center;gap:8px}
.ol{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--tx)}
.ob{padding:12px;font-size:12px;line-height:1.7;color:var(--tx);white-space:pre-wrap;font-family:var(--sans)}
.ofoot{padding:6px 12px;border-top:1px solid var(--br);display:flex;justify-content:flex-end;gap:6px}

/* loading */
.sp{width:12px;height:12px;border:2px solid rgba(255,255,255,.08);border-top-color:var(--tx);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-row{display:flex;align-items:center;gap:10px;padding:14px;color:var(--mu);font-size:12px}

/* auth */
.auth-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:left}
.auth-inner{width:100%;max-width:360px}
.auth-brand{display:flex;align-items:center;gap:10px;margin-bottom:36px;justify-content:center}
.auth-title{font-family:var(--serif);font-size:34px;font-weight:600;letter-spacing:-0.025em;line-height:1.1;margin-bottom:8px}
.auth-sub{font-size:14px;color:var(--mu);margin-bottom:28px;line-height:1.5}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;color:var(--mu);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.input{width:100%;padding:12px 14px;background:var(--sf);border:1px solid var(--br);border-radius:9px;color:var(--tx);font:500 14px/1.4 var(--sans);transition:border-color .15s}
.input:focus{outline:none;border-color:var(--br2)}
.auth-err{background:rgba(232,90,44,.08);border:1px solid rgba(232,90,44,.3);color:var(--ac);padding:9px 12px;border-radius:8px;font-size:12px;margin-bottom:12px}
.auth-switch{text-align:center;margin-top:20px;font-size:12px;color:var(--mu)}
.auth-switch a{color:var(--tx);cursor:pointer;font-weight:600;text-decoration:underline;text-decoration-color:var(--mu2);text-underline-offset:3px}

/* onboarding chips */
.pick-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;max-height:280px;overflow-y:auto;padding:2px}
.pick{padding:7px 12px;border-radius:99px;border:1px solid var(--br);font-size:11px;cursor:pointer;background:transparent;color:var(--mu);transition:all .15s}
.pick:hover{color:var(--tx)}
.pick.on{background:var(--tx);color:var(--bg);border-color:var(--tx);font-weight:600}

/* tab bar */
.tabbar{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,15,.9);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-top:1px solid var(--br);display:flex;justify-content:space-around;align-items:center;height:var(--tab-h);padding-bottom:env(safe-area-inset-bottom);z-index:50;max-width:560px;margin:0 auto}
.tab{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--mu);font:500 9px/1 var(--sans);cursor:pointer;padding:6px 10px;flex:1;letter-spacing:.02em;text-transform:uppercase}
.tab.active{color:var(--tx)}
.tab:active{transform:scale(.95)}

/* calendar */
.cal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.cal-hd h3{font-family:var(--serif);font-size:22px;font-weight:600;letter-spacing:-0.02em}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;margin-bottom:16px}
.cal-day-lbl{font-size:9px;color:var(--mu);font-weight:600;padding:4px 0;letter-spacing:.5px;text-transform:uppercase}
.cal-cell{aspect-ratio:1;padding:4px;border-radius:6px;position:relative;font-size:11px;color:var(--mu);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:5px;transition:background .15s}
.cal-cell.has{color:var(--tx)}
.cal-cell.today{background:var(--tx);color:var(--bg);font-weight:700}
.cal-cell .dot{position:absolute;bottom:4px;width:4px;height:4px;border-radius:50%;background:var(--ac)}
.cal-cell.today .dot{background:var(--bg)}

.event-item{padding:10px 0;border-bottom:1px solid var(--br);display:flex;gap:10px;align-items:flex-start}
.event-item:last-child{border-bottom:none}
.event-date-badge{width:44px;text-align:center;padding:4px;background:var(--sf2);border-radius:6px;flex-shrink:0}
.event-date-badge .m{font-size:8px;color:var(--ac);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.event-date-badge .d{font-size:16px;font-weight:700;color:var(--tx);line-height:1.1}
.event-body{flex:1;min-width:0}
.event-title{font-size:13px;font-weight:600;line-height:1.35}
.event-desc{font-size:11px;color:var(--mu);margin-top:3px;line-height:1.4}
.event-tag{display:inline-block;font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;margin-top:4px;font-weight:600}

/* card */
.card{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);padding:18px;margin-bottom:16px}
.card-h{font-family:var(--serif);font-size:16px;font-weight:600;margin-bottom:10px;letter-spacing:-0.01em}

/* profile */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.stat{background:var(--sf);border:1px solid var(--br);border-radius:12px;padding:16px 10px;text-align:center}
.stat-n{font-family:var(--serif);font-size:30px;font-weight:700;letter-spacing:-0.02em;background:var(--grad-num);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1.05}
.stat-l{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-top:4px}

.pf-head{display:flex;flex-direction:column;align-items:center;padding:8px 0 20px;text-align:center}
.pf-avatar{width:96px;height:96px;border-radius:50%;background:var(--grad-av);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:42px;font-weight:700;color:#fff;letter-spacing:-0.02em;box-shadow:0 12px 32px rgba(124,58,237,.35),0 0 0 4px rgba(124,58,237,.12)}
.pf-name{font-family:var(--serif);font-size:20px;font-weight:700;margin-top:16px;letter-spacing:-0.015em}
.pf-email{font-size:13px;color:var(--mu);margin-top:6px}
.pf-plat-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:14px}
.pf-plat-pill{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:99px;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.28);font-size:11px;font-weight:600;color:var(--tx)}
.pf-plat-pill .em{font-size:13px;line-height:1}

.pf-card{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);padding:16px 18px;margin-bottom:14px}
.pf-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.pf-card-title{font-family:var(--serif);font-size:16px;font-weight:600;letter-spacing:-0.01em}
.pf-edit{background:transparent;border:1px solid var(--br2);color:var(--mu);font:600 10px/1 var(--sans);padding:6px 11px;border-radius:99px;cursor:pointer;text-transform:uppercase;letter-spacing:.5px}
.pf-edit:hover{color:var(--tx);border-color:var(--ac)}
.niche-tags{display:flex;flex-wrap:wrap;gap:6px}
.niche-tag{font-size:11px;font-weight:600;padding:5px 11px;border-radius:99px;line-height:1.4}
.pf-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.pf-plat-cell{display:flex;align-items:center;gap:10px;padding:12px 12px;background:var(--sf2);border:1px solid var(--br);border-radius:10px;transition:all .15s;opacity:.45}
.pf-plat-cell.on{opacity:1;border-color:var(--ac);box-shadow:0 0 0 1px var(--ac) inset,0 8px 20px rgba(124,58,237,.15)}
.pf-plat-cell .em{font-size:20px}
.pf-plat-cell .lbl{font-size:12px;font-weight:600}
.pf-plat-cell .prim{font-size:9px;color:var(--ac);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.btn-signout{width:100%;padding:14px;justify-content:center;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);color:#F87171;border-radius:12px;font:700 13px/1 var(--sans);cursor:pointer;margin-top:6px;transition:all .15s}
.btn-signout:hover{background:rgba(239,68,68,.14);color:#FCA5A5}

/* coach */
.coach-msg{background:var(--sf2);border:1px solid var(--br);border-radius:10px;padding:14px;font-size:13px;line-height:1.7;white-space:pre-wrap;margin-top:12px}

/* toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--tx);color:var(--bg);padding:10px 18px;border-radius:9px;font:600 12px/1 var(--sans);z-index:9999;box-shadow:0 10px 30px rgba(0,0,0,.4);animation:fade .25s}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--br2);border-radius:99px}

/* ─── v1.5 additions ─── */
:root{
  --heat-rising:#4ADE80;
  --heat-peaking:#F97316;
  --heat-dying:#EF4444;
}
.velo-pill{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;padding:2px 8px;border-radius:99px;letter-spacing:.4px;text-transform:uppercase;line-height:1.5;border:1px solid transparent}
.velo-rising{background:rgba(74,222,128,.12);color:var(--heat-rising);border-color:rgba(74,222,128,.28)}
.velo-peaking{background:rgba(249,115,22,.12);color:var(--heat-peaking);border-color:rgba(249,115,22,.28)}
.velo-dying{background:rgba(239,68,68,.10);color:var(--heat-dying);border-color:rgba(239,68,68,.24)}
.velo-dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse 1.6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

.countdown{display:flex;align-items:center;gap:8px;padding:10px 12px;background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.24);border-radius:8px;margin-bottom:10px}
.countdown-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--or)}
.countdown-time{font-family:var(--serif);font-size:16px;font-weight:600;color:var(--tx);letter-spacing:-0.01em;margin-left:auto}

.why{background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.24);border-radius:8px;padding:10px 12px;margin-bottom:10px}
.why-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ac2);margin-bottom:4px}
.why-body{font-size:12px;line-height:1.55;color:var(--tx)}

.best-plat{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,255,255,.03);border:1px solid var(--br);border-radius:8px;margin-bottom:10px}
.best-plat .em{font-size:16px}
.best-plat-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--mu)}
.best-plat-val{font-size:12px;font-weight:600;color:var(--tx)}

.opp{margin-bottom:12px}
.opp-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.opp-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--mu)}
.opp-val{font-family:var(--serif);font-size:14px;font-weight:700;color:var(--tx)}
.opp-bar{height:6px;background:rgba(255,255,255,.05);border-radius:99px;overflow:hidden}
.opp-fill{height:100%;background:linear-gradient(90deg,var(--heat-rising),var(--heat-peaking),var(--pk));border-radius:99px;transition:width .4s}

.action-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:12px}
.action-btn{padding:10px 6px;border-radius:9px;background:var(--sf2);border:1px solid var(--br);color:var(--tx);font:600 10px/1.2 var(--sans);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;text-transform:uppercase;letter-spacing:.4px;transition:all .15s}
.action-btn:hover{border-color:var(--ac);color:var(--ac2)}
.action-btn.primary{background:var(--ac);border-color:var(--ac);color:#fff}
.action-btn.primary:hover{background:var(--ac2)}
.action-btn:active{transform:scale(.96)}

/* Bottom sheet */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:200;display:none;align-items:flex-end;justify-content:center;animation:fade .2s}
.sheet-overlay.open{display:flex}
.sheet{background:var(--sf);border:1px solid var(--br2);border-radius:20px 20px 0 0;max-width:560px;width:100%;max-height:82vh;overflow-y:auto;padding:18px 18px 40px;animation:sheetIn .28s cubic-bezier(.2,.9,.3,1)}
@keyframes sheetIn{from{transform:translateY(30px);opacity:0}to{transform:none;opacity:1}}
.sheet-grip{width:38px;height:4px;background:var(--br2);border-radius:99px;margin:0 auto 14px}
.sheet-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sheet-h h3{font-family:var(--serif);font-size:20px;font-weight:600;letter-spacing:-0.02em}
.sheet-close{background:transparent;border:none;color:var(--mu);font-size:22px;cursor:pointer;line-height:1}
.remix-item,.title-item{background:var(--sf2);border:1px solid var(--br);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start}
.remix-item .idx,.title-item .idx{font-family:var(--serif);font-size:14px;font-weight:700;color:var(--ac2);flex-shrink:0;width:22px}
.remix-item .body,.title-item .body{flex:1;font-size:13px;line-height:1.5;color:var(--tx)}
.tiny-copy{background:transparent;border:1px solid var(--br);color:var(--mu);border-radius:6px;padding:5px 8px;font-size:10px;cursor:pointer;flex-shrink:0}
.tiny-copy:hover{color:var(--tx);border-color:var(--ac)}
.hashwrap{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.hashwrap .h{font-size:11px;padding:4px 9px;border-radius:99px;background:rgba(124,58,237,.10);color:var(--ac2);border:1px solid rgba(124,58,237,.25);cursor:pointer}
.hashwrap .h:hover{background:rgba(124,58,237,.2)}

/* Daily digest */
.digest{background:linear-gradient(135deg,rgba(124,58,237,.12),rgba(236,72,153,.10));border:1px solid rgba(124,58,237,.28);border-radius:14px;padding:16px;margin-bottom:20px}
.digest-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.digest-title{font-family:var(--serif);font-size:16px;font-weight:600;letter-spacing:-0.01em}
.digest-date{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.digest-row{padding:8px 0;border-top:1px solid rgba(255,255,255,.06);font-size:12px;line-height:1.45}
.digest-row:first-of-type{border-top:none}
.digest-niche{font-size:9px;color:var(--ac2);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:2px}

/* Hooks page */
.hook-search{width:100%;padding:11px 14px;background:var(--sf);border:1px solid var(--br);border-radius:10px;color:var(--tx);font:500 13px/1.4 var(--sans);margin-bottom:12px}
.hook-search:focus{outline:none;border-color:var(--br2)}
.hook-niche-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px;scrollbar-width:none}
.hook-niche-row::-webkit-scrollbar{display:none}
.hook-niche-row .chip{flex-shrink:0}
.hook-card{background:var(--sf);border:1px solid var(--br);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start}
.hook-card .num{font-family:var(--serif);font-size:14px;font-weight:700;color:var(--ac2);flex-shrink:0;width:22px}
.hook-card .txt{flex:1;font-size:13px;line-height:1.5;color:var(--tx)}
.hook-actions{display:flex;gap:5px;flex-shrink:0}

/* Inspiration feed */
.insp-card{background:var(--sf);border:1px solid var(--br);border-radius:12px;padding:12px;margin-bottom:10px;display:flex;gap:10px}
.insp-thumb{width:52px;height:52px;border-radius:8px;background:var(--sf2);border:1px solid var(--br);display:flex;align-items:center;justify-content:center;color:var(--mu2);flex-shrink:0;font-size:20px}
.insp-body{flex:1;min-width:0}
.insp-hl{font-size:13px;font-weight:600;line-height:1.35}
.insp-meta{font-size:10px;color:var(--mu);margin-top:3px}

/* Floating AI Coach button */
.fab-coach{position:fixed;right:16px;bottom:calc(var(--tab-h) + 16px + env(safe-area-inset-bottom));z-index:80;background:linear-gradient(135deg,var(--ac),var(--pk));color:#fff;border:none;border-radius:99px;padding:12px 16px;display:flex;align-items:center;gap:6px;font:700 12px/1 var(--sans);letter-spacing:.3px;text-transform:uppercase;cursor:pointer;box-shadow:0 14px 30px rgba(124,58,237,.45),0 0 0 4px rgba(124,58,237,.12);transition:transform .15s}
.fab-coach:hover{transform:translateY(-2px)}
.fab-coach:active{transform:scale(.96)}
.fab-coach .icon{width:16px;height:16px;stroke:#fff;fill:none}
@media(min-width:900px){.fab-coach{right:calc(50% - 260px + 16px)}}

/* ── STUDIO ── */
.st-wrap{display:flex;flex-direction:column;gap:12px}
.st-stage{position:relative;background:#000;border-radius:12px;overflow:hidden;aspect-ratio:9/16;max-height:62vh}
.st-stage video,.st-stage canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.st-badge{position:absolute;top:10px;left:10px;display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.55);border-radius:99px;padding:5px 10px;color:#fff;font:700 10px/1 var(--sans);letter-spacing:.5px;text-transform:uppercase}
.st-badge .dot{width:8px;height:8px;background:#EF4444;border-radius:50%;animation:pulse 1.2s infinite}
.st-time{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.55);border-radius:6px;padding:4px 8px;color:#fff;font:600 12px var(--sans)}
.st-toolrow{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.st-tool{background:#141420;border:1px solid #2a2a3d;border-radius:10px;padding:9px 4px;color:#e6e6f0;display:flex;flex-direction:column;align-items:center;gap:3px;font:600 10px var(--sans);cursor:pointer;transition:all .15s}
.st-tool:hover{background:#1c1c2b;border-color:#7C3AED}
.st-tool.on{background:#7C3AED22;border-color:#7C3AED;color:#c9b4ff}
.st-tool svg{width:18px;height:18px}
.st-tool.rec{background:#EF4444;border-color:#EF4444;color:#fff}
.st-tool.rec.active{background:#7C3AED;border-color:#7C3AED}
.st-timeline{display:flex;gap:6px;overflow-x:auto;padding:8px 4px;scrollbar-width:none}
.st-timeline::-webkit-scrollbar{display:none}
.st-clip{position:relative;flex:0 0 auto;width:78px;height:110px;border-radius:8px;overflow:hidden;background:#0a0a0f;border:2px solid transparent;cursor:pointer}
.st-clip.sel{border-color:#7C3AED;box-shadow:0 0 0 2px #7C3AED33}
.st-clip video{width:100%;height:100%;object-fit:cover;pointer-events:none}
.st-clip .lbl{position:absolute;bottom:2px;right:4px;background:rgba(0,0,0,.7);color:#fff;font:700 9px var(--sans);border-radius:3px;padding:1px 4px}
.st-clip .del{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.65);color:#fff;width:18px;height:18px;border-radius:50%;font-size:12px;display:flex;align-items:center;justify-content:center;border:0;cursor:pointer}
.st-empty{color:var(--mu);font-size:12px;padding:18px;text-align:center;border:1px dashed #2a2a3d;border-radius:8px}
.st-trim{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.st-caps{background:#0f0f1a;border:1px solid #2a2a3d;border-radius:8px;padding:10px;max-height:180px;overflow-y:auto}
.st-cap{padding:6px 0;border-bottom:1px solid #1c1c2b;font-size:12px;color:#e6e6f0;display:flex;gap:8px}
.st-cap:last-child{border:0}
.st-cap .t{color:#7C3AED;font:700 10px var(--sans);flex:0 0 46px}
.st-bg-menu{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}

.st-bg-menu button.on{background:#7C3AED22;border-color:#7C3AED;color:#c9b4ff}

// Map platform + format label → aspect ratio hint for image gen
function aspectForContent(platform, contentType){

  if(platform==="tiktok") return "reel";
  if(platform==="youtube") return "youtube";
  return "square";
}

// Trend heuristics — velocity, opportunity, best platform, post-before window
function trendVelocity(t){
  const age = Date.now() - (t.timestamp||Date.now());
  const h = age / 3600000;
  if(h < 2) return { state:'rising', label:'Rising' };
  if(h < 8) return { state:'peaking', label:'Peaking' };
  return { state:'dying', label:'Cooling' };
}
function trendPostBefore(t){
  const v = trendVelocity(t);
  const base = t.timestamp || Date.now();
  const hours = v.state==='rising'?12: v.state==='peaking'?6:2;
  return base + hours*3600000;
}
function trendBestPlatform(t){
  const plats = S.user?.platforms || ['instagram'];
  const hay = ((t.headline||'')+' '+(t.summary||'')).toLowerCase();
  if(/dance|challenge|viral|tiktok/.test(hay) && plats.includes('tiktok')) return 'tiktok';
  if(/photo|carousel|aesthetic|fashion/.test(hay) && plats.includes('instagram')) return 'instagram';
  if(/explain|breakdown|analysis|review/.test(hay) && plats.includes('youtube')) return 'youtube';
  if(/take|debate|breaking/.test(hay) && plats.includes('twitter')) return 'twitter';
  return S.user?.primaryPlatform || plats[0] || 'instagram';
}
function trendOpportunity(t){
  const v = trendVelocity(t);
  const s = t.score || 90;
  const boost = v.state==='rising'? 8 : v.state==='peaking'? 0 : -18;
  return Math.max(20, Math.min(100, s + boost - 40));
}


async function loadTrends(){
  if(!S.user) return;
  const now = Date.now(); const cutoff = now - 6*60*60*1000;
  S.trends = []; render();
  const all = [];
  for(const niche of S.user.niches){
    try { const arr = await fetchNews(niche); all.push(...arr); } catch(e){}
    try { const arr = await fetchBlogs(niche); all.push(...arr); } catch(e){}
    const handles = NICHE_HANDLES[niche] || NICHE_HANDLES.default;
    for(const h of handles.slice(0,4)){
      try {
        const arr = await fetchTwitter(h, niche);
        arr.forEach(a=>{ a.niche = niche; if(a.image && !/^https?:/.test(a.image)) a.image = 'https://nitter.net'+a.image; if(a.image) a.image = `${API}/api/image-proxy?url=${encodeURIComponent(a.image)}`; });
        all.push(...arr);
      } catch(e){}
    }
  }
  // Dedupe + freshness
  const seen = new Set();
  S.trends = all.filter(t=>{
    const k = (t.headline||"").toLowerCase().trim().slice(0,80);
    if(!k || seen.has(k)) return false; seen.add(k);
    const ts = t.timestamp || 0;
    return ts >= cutoff;
  }).sort((a,b)=> (b.score||0) - (a.score||0)).slice(0, 25);
  if(S.tab === "home") render();
}

function renderOut(o, tid, idx){
  if(!o) return "";
  if(o.type === "image"){
    return `<div class="oc"><div class="oh"><span class="ol">Image</span></div><div style="padding:10px"><img loading="lazy" decoding="async" src="${o.img}" style="width:100%;border-radius:6px"/></div><div class="ofoot"><button class="btn bo bxs" onclick="dl('${o.img}','image.jpg')">${I.dl} Download</button><button class="btn bp bxs" onclick="saveOut('${tid}',${idx})">${I.save} Save</button></div></div>`;
  }
  if(o.type === "carousel"){
    const slides = (o.slides||[]).map(s=>`<div style="padding:8px 0;border-bottom:1px solid var(--br)"><div style="font-size:10px;color:var(--mu);font-weight:600">Slide ${s.slideNum}</div>${s.img?`<img loading="lazy" decoding="async" src="${s.img}" style="width:100%;border-radius:6px;margin-top:6px;aspect-ratio:4/5;object-fit:cover"/>`:""}<div style="font-family:var(--serif);font-size:14px;font-weight:600;margin-top:6px">${esc(s.title)}</div><div style="font-size:12px;color:var(--mu);margin-top:3px;line-height:1.5">${esc(s.body)}</div></div>`).join("");
    const cp = (o.slides||[]).map(s=>`SLIDE ${s.slideNum}: ${s.title}\n${s.body}`).join("\n\n");
    return `<div class="oc"><div class="oh"><span class="ol">Carousel · ${o.slides?.length||0} slides</span><button class="btn bo bxs" onclick="copyTxt(\`${cp.replace(/`/g,"\\`")}\`)">${I.copy}</button></div><div style="padding:10px">${slides}</div><div class="ofoot"><button class="btn bp bxs" onclick="saveOut('${tid}',${idx})">${I.save} Save</button></div></div>`;
  }
  const content = String(o.content||"");
  return `<div class="oc"><div class="oh"><span class="ol">${esc(o.label||"Draft")}</span><button class="btn bo bxs" onclick="copyTxt(\`${content.replace(/`/g,"\\`")}\`)">${I.copy}</button></div><div class="ob">${esc(content)}</div><div class="ofoot"><button class="btn bp bxs" onclick="saveOut('${tid}',${idx})">${I.save} Save</button></div></div>`;
}

window.gen = async (tid, all) => {
  const t = S.trends.find(x=>x.id===tid); if(!t) return;
  const plat = S.plat[tid] || S.user?.primaryPlatform || "instagram";
  const ct = S.ctype[tid] || PTYPES[plat]?.[0] || "";
  const tone = S.tone[tid] || "normal";
  S.loading[tid] = true; S.outs[tid] = []; render();
  try {
    const types = all ? (PTYPES[plat]||[]) : [ct];
    const out = [];
    for(const c of types){
      if(c === "IG Carousel"){
        const sr = await generateText(`Return ONLY a valid JSON array of 5 objects: [{"slideNum":1,"title":"hook","body":"2-3 sentences"}].`, `${S.user?.niches?.[0]||""} carousel. Story: "${t.headline}". ${t.summary||""}`, tone);
        const slides = extractJSON(sr) || [];
        const slideArr = Array.isArray(slides)?slides:[slides];
        // Also generate 5 matching images for the carousel
        let imgs = [];
        try { imgs = await generateImage(`${t.headline}, ${t.niche}, editorial magazine photo, cinematic`, "carousel", 5); } catch(e){}
        slideArr.forEach((s,i)=>{ if(imgs[i]) s.img = imgs[i]; });
        out.push({type:"carousel", slides: slideArr, images: imgs});
      } else if(c === "Thumbnail" || /image/i.test(c)){
        const aspect = aspectForContent(plat, c);
        const img = await generateImage(`${t.headline}, ${t.niche}, bold editorial thumbnail, dramatic lighting`, aspect);
        if(img) out.push({type:"image", img, aspect});
      } else {
        const P = PLATS.find(x=>x.id===plat);
        const s = await generateText(SYS, `Write a "${c}" for a ${t.niche} creator on ${P?.label||plat}. Story: "${t.headline}". ${t.summary||""}. Return only the ready-to-post text.`, tone);
        out.push({type:"text", label:`${P?.label||plat} · ${c}`, content:s});
      }
    }
    S.outs[tid] = out;
    if(out.length && S.token){
      const today = new Date();
      const sd = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
      const first = out[0];

      loadSchedule(); loadSaved();
    }
  } catch(e){ S.outs[tid] = [{type:"text", label:"Error", content:"Generation failed. "+e.message}]; }
  S.loading[tid] = false; render();
};

// ─── HOOKS PAGE ─────────────────────────────────────────────────────────────
function pageHooks(){
  const userNiches = S.user?.niches || [];
  if(!S.hooksNiche && userNiches.length) S.hooksNiche = userNiches[0];
  const active = S.hooksNiche;
  const nicheChips = userNiches.map(n=>`<button class="chip ${active===n?'active':''}" onclick="setHooksNiche('${esc(n)}')">${esc(n)}</button>`).join("");
  const hooks = S.hooksCache[active] || [];
  const q = (S.hooksSearch||"").toLowerCase();
  const filtered = q ? hooks.filter(h=>h.text.toLowerCase().includes(q)) : hooks;
  const list = filtered.length
    ? filtered.map((h,i)=>`<div class="hook-card"><div class="num">${i+1}</div><div class="txt">${esc(h.text)}</div><div class="hook-actions"><button class="tiny-copy" onclick="copyTxt(\`${h.text.replace(/`/g,'\\`')}\`)">Copy</button><button class="tiny-copy" onclick="prefillHook(\`${h.text.replace(/`/g,'\\`')}\`)">Use</button></div></div>`).join("")
    : hooks.length ? `<div style="color:var(--mu);font-size:12px;padding:20px 0;text-align:center">No hooks match "${esc(S.hooksSearch)}".</div>`
    : `<div class="loading-row"><span class="sp"></span>Loading 50 hooks for ${esc(active||"your niche")}…</div>`;
  return `<main class="page active">${topBar("Reusable hooks")}
    <div class="sec-h"><h2>Hooks</h2><span class="sec-meta">50 per niche</span></div>
    <input class="hook-search" placeholder="Search hooks…" value="${esc(S.hooksSearch)}" oninput="S.hooksSearch=this.value;render()"/>
    <div class="hook-niche-row">${nicheChips || '<span style="color:var(--mu);font-size:12px">Add niches in Profile to see hooks.</span>'}</div>
    ${list}
  </main>`;
}
window.setHooksNiche = async (n) => {
  S.hooksNiche = n; render();
  if(!S.hooksCache[n]){
    try { const d = await api(`/api/hooks?niche=${encodeURIComponent(n)}`); S.hooksCache[n] = d.hooks||[]; render(); } catch(e){}
  }
};
window.prefillHook = (txt) => { S.tab='home'; toast("Hook copied — pick a story to remix"); navigator.clipboard.writeText(txt); render(); };

// ─── REMIX / TITLE PACK BOTTOM SHEETS ───────────────────────────────────────
window.openRemix = async (tid) => {
  const t = S.trends.find(x=>x.id===tid); if(!t) return;
  S.sheet = { kind:"remix", tid, loading:true, data:null }; render();
  try {
    const raw = await generateText("Return ONLY a JSON array of 5 objects: [{\"angle\":\"...\",\"desc\":\"1-2 sentences on how to shoot it\"}]. No markdown.", `Give me 5 different content angles for a ${t.niche} creator on this story: \"${t.headline}\". Vary format and POV.`);
    const parsed = extractJSON(raw) || [];
    S.sheet.data = Array.isArray(parsed) ? parsed : [];
  } catch(e){ S.sheet.data = []; }
  S.sheet.loading = false; render();
};
window.openTitles = async (tid) => {
  const t = S.trends.find(x=>x.id===tid); if(!t) return;
  S.sheet = { kind:"titles", tid, loading:true, data:null }; render();
  try {
    const raw = await generateText("Return ONLY valid JSON: {\"titles\":[5 strings],\"hashtags\":[15 strings without # prefix]}. No markdown.", `Story: \"${t.headline}\". Niche: ${t.niche}. Generate 5 scroll-stopping titles and 15 hashtags for a creator.`);
    const parsed = extractJSON(raw) || { titles:[], hashtags:[] };
    S.sheet.data = parsed;
  } catch(e){ S.sheet.data = {titles:[], hashtags:[]}; }
  S.sheet.loading = false; render();
};
window.closeSheet = () => { S.sheet = null; render(); };
window.copyAllHashtags = (tags) => {
  const txt = tags.map(t=>'#'+t.replace(/^#/,'')).join(' ');
  navigator.clipboard.writeText(txt); toast("All hashtags copied");
};
window.quickSaveTrend = async (tid) => {
  const t = S.trends.find(x=>x.id===tid); if(!t||!S.token) return;
  const today = new Date(); const sd = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const plat = S.plat[tid] || S.user?.primaryPlatform || "instagram";
  const r = await api("/api/save-post",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:S.token,headline:t.headline,niche:t.niche,platform:plat,contentType:"Story",content:{headline:t.headline,summary:t.summary},scheduledDate:sd})});
  if(r.success){ toast("Saved to Calendar"); loadSaved(); loadSchedule(); }
};

function renderSheet(){
  if(!S.sheet) return "";
  const sh = S.sheet;
  let body = "";
  if(sh.loading){
    body = `<div class="loading-row"><span class="sp"></span>${sh.kind==='remix'?'Building 5 angles…':'Crafting titles + hashtags…'}</div>`;
  } else if(sh.kind==='remix'){
    const items = (sh.data||[]);
    body = items.length ? items.map((x,i)=>{
      const angle = esc(x.angle||"");
      const desc = esc(x.desc||"");
      const cp = (x.angle+" — "+x.desc).replace(/`/g,'\`');
      return `<div class="remix-item"><div class="idx">${i+1}</div><div class="body"><div style="font-weight:600;margin-bottom:3px">${angle}</div><div style="color:var(--mu);font-size:12px">${desc}</div></div><button class="tiny-copy" onclick="copyTxt(\`${cp}\`)">Copy</button></div>`;
    }).join("") : `<div style="color:var(--mu);font-size:12px">No angles — try again.</div>`;
  } else {
    const d = sh.data||{};
    const titles = (d.titles||[]).map((t,i)=>{
      const safe = String(t).replace(/`/g,'\`');
      return `<div class="title-item"><div class="idx">${i+1}</div><div class="body">${esc(t)}</div><button class="tiny-copy" onclick="copyTxt(\`${safe}\`)">Copy</button></div>`;
    }).join("");
    const tags = d.hashtags || [];
    const tagsHTML = tags.length ? `<div style="margin-top:14px"><div class="chip-label" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">Hashtags · ${tags.length}<button class="tiny-copy" onclick='copyAllHashtags(${JSON.stringify(tags).replace(/'/g,"&#39;")})'>Copy All</button></div><div class="hashwrap">${tags.map(t=>`<span class="h" onclick="copyTxt('#${esc(t.replace(/^#/,''))}')">#${esc(t.replace(/^#/,''))}</span>`).join("")}</div></div>` : "";
    body = titles + tagsHTML;
  }
  return `<div class="sheet-overlay open" onclick="if(event.target===this)closeSheet()">
    <div class="sheet"><div class="sheet-grip"></div>
      <div class="sheet-h"><h3>${sh.kind==='remix'?'Remix — 5 angles':'Title Pack'}</h3><button class="sheet-close" onclick="closeSheet()">×</button></div>
      ${body}
    </div>
  </div>`;
}

function pageCalendar(){
  const y = S.cal.y, m = S.cal.m;
  const first = new Date(y,m,1).getDay(), days = new Date(y,m+1,0).getDate();
  const today = new Date();
  const isCur = today.getFullYear()===y && today.getMonth()===m;
  const postsByDate = {};
  S.schedule.forEach(p=>{ if(p.scheduled_date){ const d = new Date(p.scheduled_date).getDate(); (postsByDate[d]=postsByDate[d]||[]).push(p); } });
  let grid = DAYS.map(d=>`<div class="cal-day-lbl">${d}</div>`).join("");
  for(let i=0;i<first;i++) grid += `<div></div>`;
  for(let d=1;d<=days;d++){
    const has = !!postsByDate[d];
    const tod = isCur && d===today.getDate();
    grid += `<div class="cal-cell ${has?'has':''} ${tod?'today':''}">${d}${has?'<span class="dot"></span>':''}</div>`;
  }
  // Upcoming: pull events from cache for user niches + saved schedule
  const combined = [];
  (S.user?.niches||[]).forEach(n => (S.eventsCache[n]||[]).forEach(e => combined.push({date:e.date, title:e.title, desc:e.description, kind:"Event", niche:n})));
  S.schedule.forEach(p => combined.push({date:p.scheduled_date, title:p.headline, desc:p.niche, kind:p.content_type||"Post"}));
  combined.sort((a,b)=> new Date(a.date) - new Date(b.date));
  const now = new Date(); const upcoming = combined.filter(x=> new Date(x.date) >= new Date(now.getFullYear(),now.getMonth(),now.getDate())).slice(0, 12);
  const events = upcoming.map(e=>{ const dt = new Date(e.date); return `<div class="event-item"><div class="event-date-badge"><div class="m">${M_SHORT[dt.getMonth()]}</div><div class="d">${dt.getDate()}</div></div><div class="event-body"><div class="event-title">${esc(e.title)}</div>${e.desc?`<div class="event-desc">${esc(e.desc)}</div>`:""}<div class="event-tag">${esc(e.kind)}${e.niche?' · '+esc(e.niche):''}</div></div></div>`; }).join("");

  const asch = S.addSched;
  return `<main class="page active">${topBar("Schedule")}
    <div class="sec-h"><h2>Calendar</h2></div>
    <div class="card">
      <div class="cal-hd">
        <h3>${MONTHS[m]} ${y}</h3>
        <div style="display:flex;gap:4px">
          <button class="iconbtn" onclick="calNav(-1)">‹</button>
          <button class="iconbtn" onclick="calNav(1)">›</button>
        </div>
      </div>
      <div class="cal-grid">${grid}</div>
    </div>
    <div class="card">
      <div class="card-h">Add to your schedule</div>
      <div class="field"><label>What are you doing</label><input class="input" placeholder="Go live · Post reel · Record podcast" value="${esc(asch.title)}" oninput="S.addSched.title=this.value"/></div>
      <div style="display:flex;gap:8px">
        <div class="field" style="flex:1"><label>Every</label><select class="input" onchange="S.addSched.weekday=this.value">${["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"].map(d=>`<option value="${d.toLowerCase()}" ${asch.weekday===d.toLowerCase()?'selected':''}>${d}</option>`).join("")}</select></div>
        <div class="field" style="flex:1"><label>Time</label><input class="input" type="time" value="${esc(asch.time)}" oninput="S.addSched.time=this.value"/></div>
      </div>
      <button class="btn bp" style="width:100%;padding:12px;justify-content:center" onclick="addRecurring()">${I.plus} Add for next 12 months</button>
    </div>
    <div class="card">
      <div class="card-h">Upcoming</div>
      ${events || `<div style="color:var(--mu);font-size:12px">Your niche events and scheduled posts will show here.</div>`}
    </div>
  </main>`;
}
window.calNav = (dir) => {
  S.cal.m += dir;
  if(S.cal.m < 0){ S.cal.m=11; S.cal.y--; }
  if(S.cal.m > 11){ S.cal.m=0; S.cal.y++; }
  loadSchedule();
  // Prefetch events for niches
  (S.user?.niches||[]).forEach(async n => { if(!S.eventsCache[n]) S.eventsCache[n] = await fetchEvents(n); render(); });
};

// ─── CREATE STUDIO ─────────────────────────────────────────────────────────
// Teleprompter + camera + auto-captions + trim + export.
function pageCreate(){
  const st = S.studio || (S.studio = {
    script:"", speed:60, mirror:true, running:false,
    clips:[], selectedId:null, captions:[], bg:"off",
    camReady:false, facing:"user", micOn:true, exporting:false,
  });
  const sel = st.clips.find(c => c.id === st.selectedId) || null;

  return `<main class="page active">${topBar("Studio")}
    <div class="sec-h"><h2>Create</h2><span class="sec-meta">Record · Trim · Split · Captions · Export</span></div>

    <div class="card">
      <div class="card-h">Teleprompter script <span style="color:var(--mu);font-weight:500;font-size:11px">(optional)</span></div>
      <div class="field"><textarea class="input" rows="3" placeholder="Type or paste — scrolls over the camera while recording." oninput="S.studio.script=this.value">${esc(st.script)}</textarea></div>
      <div style="display:flex;gap:8px">
        <div class="field" style="flex:1;margin:0"><label>Speed</label><input class="input" type="range" min="30" max="140" value="${st.speed}" oninput="S.studio.speed=+this.value"/></div>
        <div class="field" style="flex:1;margin:0"><label>Mirror</label><select class="input" onchange="S.studio.mirror=this.value==='yes';render()"><option value="no" ${!st.mirror?'selected':''}>Off</option><option value="yes" ${st.mirror?'selected':''}>On</option></select></div>
      </div>
    </div>

    <div class="card" style="padding:12px">
      <div class="st-wrap">
        <div class="st-stage" id="st-stage">
          <video id="st-live" playsinline muted autoplay style="${st.mirror?'transform:scaleX(-1)':''};display:${st.bg==='off'?'block':'none'}"></video>
          <canvas id="st-canvas" style="${st.mirror?'transform:scaleX(-1)':''};display:${st.bg!=='off'?'block':'none'}"></canvas>
          <div id="st-prompter" style="position:absolute;inset:auto 0 0 0;height:34%;background:linear-gradient(0deg,rgba(0,0,0,.75),rgba(0,0,0,.15));padding:12px 14px;overflow:hidden;pointer-events:none;display:${st.script?'block':'none'}">
            <div id="st-prompter-inner" style="color:#fff;font:600 18px/1.5 var(--serif);text-shadow:0 2px 8px rgba(0,0,0,.7);white-space:pre-wrap;will-change:transform">${esc(st.script||"")}</div>
          </div>
          ${st.running?'<div class="st-badge"><span class="dot"></span>REC</div>':''}
          <div class="st-time" id="st-timer" style="display:${st.running?'block':'none'}">0:00</div>
        </div>

        <div class="st-toolrow">
          <button class="st-tool rec ${st.running?'active':''}" onclick="studioToggleRecord()">
            ${st.running?I.stop:I.mic}<span>${st.running?'Stop':'Record'}</span>
          </button>
          <button class="st-tool" onclick="studioUploadClick()">
            ${I.dl}<span>Upload</span>
            <input type="file" id="st-file" accept="video/*" multiple style="display:none" onchange="studioUpload(event)"/>
          </button>
          <button class="st-tool" onclick="studioFlip()">${I.refresh}<span>Flip</span></button>
          <button class="st-tool ${st.micOn?'':'on'}" onclick="studioMic()">${I.mic}<span>${st.micOn?'Mic on':'Muted'}</span></button>
        </div>

        <div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <div style="font:700 12px var(--sans);color:#c9c9d6">Timeline · ${st.clips.length} clip${st.clips.length===1?'':'s'}</div>
            <div style="font:600 11px var(--sans);color:var(--mu)">${studioTotalDur().toFixed(1)}s total</div>
          </div>
          ${st.clips.length ? `<div class="st-timeline" id="st-timeline">${st.clips.map((c,i)=>`
            <div class="st-clip ${c.id===st.selectedId?'sel':''}" onclick="studioSelect('${c.id}')" draggable="true"
              ondragstart="studioDragStart(event,'${c.id}')" ondragover="event.preventDefault()"
              ondrop="studioDrop(event,'${c.id}')">
              <video src="${c.url}" preload="metadata" muted></video>
              <button class="del" onclick="event.stopPropagation();studioDelete('${c.id}')" aria-label="Delete">×</button>
              <span class="lbl">${i+1}</span>

        </div>

        <div>
          <div style="font:700 12px var(--sans);color:#c9c9d6;margin-bottom:4px">Background</div>
          <div class="st-bg-menu">
            ${["off","blur","dark","purple"].map(m=>`<button class="${st.bg===m?'on':''}" onclick="studioBg('${m}')">${m==='off'?'Camera':m==='blur'?'Blur':m==='dark'?'Dark':'Purple'}</button>`).join("")}
          </div>
          <div style="font-size:10px;color:var(--mu);margin-top:4px">Blur/color uses on-device segmentation. Auto-disabled on low-end phones.</div>
        </div>
      </div>
    </div>

    ${sel ? `
    <div class="card">
      <div class="card-h">Edit clip ${st.clips.findIndex(c=>c.id===sel.id)+1}</div>
      <video id="st-preview" controls playsinline src="${sel.url}" style="width:100%;border-radius:8px;background:#000;margin-bottom:10px" onloadedmetadata="studioPreviewMeta(this)"></video>
      <div class="st-trim">
        <div class="field" style="margin:0"><label>Trim in (s)</label><input class="input" type="number" min="0" step="0.1" value="${sel.inMs/1000}" oninput="studioSetTrim('${sel.id}','in',this.value)"/></div>
        <div class="field" style="margin:0"><label>Trim out (s)</label><input class="input" type="number" min="0" step="0.1" value="${sel.outMs/1000}" oninput="studioSetTrim('${sel.id}','out',this.value)"/></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn bs" style="flex:1;padding:10px;justify-content:center" onclick="studioSplit('${sel.id}')">Split at playhead</button>

    <div class="card">
      <div class="card-h">Captions & export</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn bs" style="flex:1;min-width:140px;padding:12px;justify-content:center" ${!sel||st.transcribing?'disabled':''} onclick="studioCaption()">
          ${I.sparkle} ${st.transcribing?'Transcribing…':'Auto-caption clip'}
        </button>
        <button class="btn bp" style="flex:1;min-width:140px;padding:12px;justify-content:center" ${!st.clips.length||st.exporting?'disabled':''} onclick="studioExport()">
          ${I.dl} ${st.exporting?'Exporting…':'Export video'}
        </button>
      </div>
      ${(st.captions||[]).length ? `<div class="st-caps" style="margin-top:10px">${st.captions.map(c=>`
        <div class="st-cap"><span class="t">${_fmtTs(c.start)}</span><span>${esc(c.text)}</span></div>`).join("")}</div>` : ""}
      <div style="font-size:11px;color:var(--mu);margin-top:8px;line-height:1.5">

      </div>
    </div>
  </main>`;
}

function _fmtTs(s){ s=Math.max(0,+s||0); const m=Math.floor(s/60), r=Math.floor(s%60); return `${m}:${String(r).padStart(2,'0')}`; }
function studioTotalDur(){ return (S.studio.clips||[]).reduce((n,c)=>n+Math.max(0,(c.outMs-c.inMs))/1000, 0); }

window._st = { stream:null, recorder:null, chunks:[], scrollRAF:null, timerRAF:null, tStart:0, seg:null, segRAF:null, dragId:null };

window.studioInitStage = async () => {
  const S2 = S.studio;
  if(!S2) return;
  // Bring up camera stream if not yet
  if(!window._st.stream){
    try {

      S2.camReady = true;
    } catch(e){ toast("Camera permission denied"); return; }
  }
  const v = document.getElementById("st-live");
  if(v && !v.srcObject){ v.srcObject = window._st.stream; v.play().catch(()=>{}); }
  // Kick canvas pipeline if bg != off
  if(S2.bg !== "off") studioBgLoop();
};

// MediaPipe Selfie Segmentation loaded lazily
let _mp = null;
async function _loadSegmenter(){
  if(_mp) return _mp;
  await new Promise((res,rej)=>{
    const s=document.createElement("script");
    s.src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js";
    s.onload=res; s.onerror=rej; document.head.appendChild(s);
  });
  const seg = new window.SelfieSegmentation({ locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${f}` });
  seg.setOptions({ modelSelection:1 });
  _mp = seg; return seg;
}

async function studioBgLoop(){
  const cv = document.getElementById("st-canvas");
  const v  = document.getElementById("st-live");
  if(!cv || !v || !window._st.stream) return;
  const seg = await _loadSegmenter().catch(()=>null);
  if(!seg){ toast("Background effects unavailable"); S.studio.bg="off"; render(); return; }
  cv.width = 720; cv.height = 1280;
  const ctx = cv.getContext("2d");
  seg.onResults((res) => {
    if(S.studio.bg === "off") return;
    ctx.save(); ctx.clearRect(0,0,cv.width,cv.height);
    // Draw person mask
    ctx.drawImage(res.segmentationMask,0,0,cv.width,cv.height);
    ctx.globalCompositeOperation="source-in";
    ctx.drawImage(res.image,0,0,cv.width,cv.height);
    // Draw background under
    ctx.globalCompositeOperation="destination-over";
    if(S.studio.bg==="blur"){ ctx.filter="blur(14px)"; ctx.drawImage(res.image,0,0,cv.width,cv.height); ctx.filter="none"; }
    else if(S.studio.bg==="dark"){ ctx.fillStyle="#0a0a0f"; ctx.fillRect(0,0,cv.width,cv.height); }
    else if(S.studio.bg==="purple"){ const g=ctx.createLinearGradient(0,0,0,cv.height); g.addColorStop(0,"#3b0764"); g.addColorStop(1,"#7C3AED"); ctx.fillStyle=g; ctx.fillRect(0,0,cv.width,cv.height); }
    ctx.restore();
  });
  const tick = async () => {
    if(S.studio.bg === "off") return;
    if(v.readyState >= 2){ try { await seg.send({ image:v }); } catch(_){} }
    window._st.segRAF = requestAnimationFrame(tick);
  };
  tick();
}

window.studioToggleRecord = async () => {
  const S2 = S.studio;
  await window.studioInitStage();
  if(!window._st.stream){ return; }
  if(S2.running){
    try { window._st.recorder && window._st.recorder.stop(); } catch(_){}
    S2.running = false;
    if(window._st.scrollRAF) cancelAnimationFrame(window._st.scrollRAF);
    if(window._st.timerRAF) cancelAnimationFrame(window._st.timerRAF);
    return;
  }
  // Choose source stream: canvas if bg effect on, else camera
  let recStream = window._st.stream;
  if(S2.bg !== "off"){
    const cv = document.getElementById("st-canvas");
    if(cv && cv.captureStream){
      const cs = cv.captureStream(30);
      window._st.stream.getAudioTracks().forEach(t => cs.addTrack(t));
      recStream = cs;
    }
  }
  const mime = MediaRecorder.isTypeSupported("video/mp4;codecs=avc1,mp4a.40.2")
    ? "video/mp4;codecs=avc1,mp4a.40.2"
    : MediaRecorder.isTypeSupported("video/webm;codecs=vp9,opus")
      ? "video/webm;codecs=vp9,opus"
      : "video/webm";
  const rec = new MediaRecorder(recStream, { mimeType:mime });
  window._st.recorder = rec; window._st.chunks = [];
  rec.ondataavailable = e => e.data && e.data.size && window._st.chunks.push(e.data);
  rec.onstop = async () => {
    const blob = new Blob(window._st.chunks, { type: mime.split(";")[0] });
    const url = URL.createObjectURL(blob);
    const dur = await _probeDur(url);
    S.studio.clips.push({ id:"c"+Date.now()+Math.random().toString(36).slice(2,6), url, blob, dur, inMs:0, outMs:Math.round(dur*1000), source:"rec" });
    S.studio.selectedId = S.studio.clips[S.studio.clips.length-1].id;
    render();
  };
  rec.start(500);
  S2.running = true;
  window._st.tStart = performance.now();
  render();

  // Prompter scroll
  const el = document.getElementById("st-prompter-inner");
  if(el && S2.script){
    let start = performance.now();
    const step = (now) => {
      const dt = (now-start)/1000;
      el.style.transform = `translateY(${-dt*(S2.speed||60)}px)`;
      if(S2.running) window._st.scrollRAF = requestAnimationFrame(step);
    };
    window._st.scrollRAF = requestAnimationFrame(step);
  }
  // Timer
  const tick = () => {
    if(!S2.running) return;
    const t = document.getElementById("st-timer");
    if(t){ const s=(performance.now()-window._st.tStart)/1000; t.textContent = _fmtTs(s); }
    // Auto-stop at 3 min
    if((performance.now()-window._st.tStart) > 180000){ window.studioToggleRecord(); return; }
    window._st.timerRAF = requestAnimationFrame(tick);
  };
  window._st.timerRAF = requestAnimationFrame(tick);
};

function _probeDur(url){
  return new Promise(res => {
    const v = document.createElement("video"); v.preload="metadata"; v.src=url;
    v.onloadedmetadata = () => { const d = isFinite(v.duration)&&v.duration>0 ? v.duration : 0; res(d); };
    v.onerror = () => res(0);
  });
}

// ── Auto-captions: extract audio → WAV → POST /api/transcribe ──────────────
window.studioCaption = async () => {
  const c = S.studio.clips.find(x=>x.id===S.studio.selectedId);
  if(!c){ toast("Select a clip first"); return; }
  S.studio.transcribing = true; render();

    const wav = await _extractWav(c.blob, c.inMs/1000, c.outMs/1000);
    const r = await fetch("/api/transcribe", { method:"POST", headers:{ "Content-Type":"audio/wav" }, body:wav });
    if(!r.ok){ const j=await r.json().catch(()=>({})); throw new Error(j.error||"Transcribe failed"); }
    const data = await r.json();
    S.studio.captions = (data.segments||[]).length ? data.segments : (data.text?[{start:0,end:0,text:data.text}]:[]);
    if(!S.studio.captions.length) toast("No speech detected"); else toast("Captions ready");
  } catch(e){ toast(e.message||"Caption failed"); }
  S.studio.transcribing = false; render();
};

async function _extractWav(blob, startS, endS){
  const buf = await blob.arrayBuffer();
  const AC = window.AudioContext || window.webkitAudioContext;
  const actx = new AC();
  const audio = await actx.decodeAudioData(buf.slice(0));
  const sr = 16000;
  const s0 = Math.max(0, Math.floor(startS * audio.sampleRate));
  const s1 = Math.min(audio.length, Math.floor((endS||audio.duration) * audio.sampleRate));
  const src = audio.getChannelData(0).subarray(s0, s1);
  // Downsample to 16k mono
  const ratio = audio.sampleRate / sr;
  const outLen = Math.floor(src.length / ratio);
  const out = new Float32Array(outLen);
  for(let i=0;i<outLen;i++){ out[i] = src[Math.floor(i*ratio)]; }
  try { actx.close(); } catch(_){}
  // Encode 16-bit PCM WAV
  const bytes = new ArrayBuffer(44 + outLen*2);
  const dv = new DataView(bytes);
  const w = (o,s)=>{ for(let i=0;i<s.length;i++) dv.setUint8(o+i,s.charCodeAt(i)); };
  w(0,"RIFF"); dv.setUint32(4, 36+outLen*2, true); w(8,"WAVE"); w(12,"fmt "); dv.setUint32(16,16,true);
  dv.setUint16(20,1,true); dv.setUint16(22,1,true); dv.setUint32(24,sr,true); dv.setUint32(28,sr*2,true);
  dv.setUint16(32,2,true); dv.setUint16(34,16,true); w(36,"data"); dv.setUint32(40,outLen*2,true);
  let o=44; for(let i=0;i<outLen;i++){ const v=Math.max(-1,Math.min(1,out[i])); dv.setInt16(o, v<0?v*0x8000:v*0x7FFF, true); o+=2; }
  return new Blob([bytes], { type:"audio/wav" });
}

// ── Export: sequential canvas + audio → MediaRecorder ─────────────────────
window.studioExport = async () => {
  const clips = S.studio.clips; if(!clips.length){ toast("Add a clip first"); return; }
  if(clips.length===1 && clips[0].inMs===0 && Math.abs(clips[0].outMs - clips[0].dur*1000)<50){
    // No edits: direct download
    const c = clips[0]; const ext = (c.blob.type||"video/webm").includes("mp4")?"mp4":"webm";
    _shareOrDownload(c.blob, `creatorpulse-${Date.now()}.${ext}`); toast("Exported"); return;
  }
  S.studio.exporting = true; render();
  try {
    const out = await _composeTimeline(clips);
    _shareOrDownload(out, `creatorpulse-${Date.now()}.${out.type.includes("mp4")?"mp4":"webm"}`);
    toast("Exported");
  } catch(e){ console.error(e); toast("Export failed"); }
  S.studio.exporting = false; render();
};

function _shareOrDownload(blob, name){
  const file = new File([blob], name, { type:blob.type });
  if(navigator.share && navigator.canShare && navigator.canShare({ files:[file] })){
    navigator.share({ files:[file], title:"CreatorPulse video" }).catch(()=>{});
  } else {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href=url; a.download=name; a.click();
    setTimeout(()=>URL.revokeObjectURL(url), 4000);
  }
}

async function _composeTimeline(clips){
  const W=720, H=1280;
  const cv = document.createElement("canvas"); cv.width=W; cv.height=H;
  const ctx = cv.getContext("2d");
  const AC = window.AudioContext || window.webkitAudioContext;
  const actx = new AC();
  const dest = actx.createMediaStreamDestination();
  const vStream = cv.captureStream(30);
  dest.stream.getAudioTracks().forEach(t => vStream.addTrack(t));
  const mime = MediaRecorder.isTypeSupported("video/mp4;codecs=avc1,mp4a.40.2")
    ? "video/mp4;codecs=avc1,mp4a.40.2"
    : "video/webm;codecs=vp9,opus";
  const rec = new MediaRecorder(vStream, { mimeType:mime });
  const chunks = [];
  rec.ondataavailable = e => e.data && e.data.size && chunks.push(e.data);
  const done = new Promise(r => rec.onstop = r);
  rec.start();

  for(const c of clips){
    await new Promise(async (resolve) => {
      const v = document.createElement("video");
      v.src = c.url; v.playsInline = true; v.muted = false; v.crossOrigin="anonymous";
      await new Promise(rs => { v.onloadedmetadata = rs; });
      v.currentTime = c.inMs/1000;
      await new Promise(rs => { v.onseeked = rs; });
      // Route audio into destination
      let node = null;
      try { node = actx.createMediaElementSource(v); node.connect(dest); } catch(_){}
      const endT = c.outMs/1000;
      const draw = () => {
        if(v.paused || v.ended || v.currentTime >= endT){
          try { v.pause(); } catch(_){}
          try { node && node.disconnect(); } catch(_){}
          return resolve();
        }
        // Cover-fit
        const ar = v.videoWidth/v.videoHeight;
        const tar = W/H;
        let dw=W, dh=H, dx=0, dy=0;
        if(ar > tar){ dh=H; dw=H*ar; dx=(W-dw)/2; } else { dw=W; dh=W/ar; dy=(H-dh)/2; }
        ctx.fillStyle="#000"; ctx.fillRect(0,0,W,H);
        try { ctx.drawImage(v, dx, dy, dw, dh); } catch(_){}
        requestAnimationFrame(draw);
      };
      v.play().catch(()=>{});
      draw();
    });
  }
  rec.stop();
  await done;
  try { actx.close(); } catch(_){}
  return new Blob(chunks, { type: mime.split(";")[0] });
}

function renderInspirationFeed(){

  // ─── 2. FETCH WRAPPER: retry, error toast, analytics on failures ──────────
  const _fetch = window.fetch.bind(window);
  window.fetch = async (input, init) => {
    const url = typeof input === "string" ? input : input.url;
    const isApi = /\/api\//.test(url);
    let attempt = 0, lastErr;
    while (attempt < (isApi ? 2 : 1)) {
      try {
        const r = await _fetch(input, init);
        if (isApi && r.status >= 500) throw new Error("HTTP " + r.status);
        return r;
      } catch (e) {
        lastErr = e;
        attempt++;
        if (attempt < 2) await new Promise(res => setTimeout(res, 600));
      }
    }
    if (isApi) {
      try { window.toast && window.toast("Network hiccup — tap to retry", 3500); } catch (_) {}
      track("api_error", { url: url.split("?")[0], msg: String(lastErr).slice(0,80) });
    }
    throw lastErr;
  };

  // ─── 3. ANALYTICS ────────────────────────────────────────────────────────
  const track = (name, props) => {
    try {
      _fetch("/api/analytics/event", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ userId: uid(), name, props: props || {} }),
        keepalive: true,

else if (kind === "terms" || kind === "privacy" || kind === "cookies" || kind === "aup" ||

  // Contact form modal
  window.renderContactModal = function(box){
    box.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-weight:700;font-size:16px">Contact us</div>
        <button onclick="cpCloseModal()" style="border:0;background:transparent;font-size:22px;cursor:pointer">×</button>
      </div>
      <div style="font-size:12px;color:#666;margin-bottom:12px">Questions, bug reports, DMCA, business enquiries — this reaches us directly.</div>
      <label style="display:block;font-size:11px;color:#666;margin-bottom:4px">Your name</label>
      <input id="cp-ct-name" maxlength="80" placeholder="Jane Doe" style="width:100%;border:1px solid #ddd;border-radius:8px;padding:9px;font:13px system-ui;margin-bottom:8px"/>
      <label style="display:block;font-size:11px;color:#666;margin-bottom:4px">Email</label>
      <input id="cp-ct-email" type="email" maxlength="255" placeholder="you@example.com" style="width:100%;border:1px solid #ddd;border-radius:8px;padding:9px;font:13px system-ui;margin-bottom:8px" value="${escapeHtml((window.S && window.S.user && window.S.user.email) || "")}"/>
      <label style="display:block;font-size:11px;color:#666;margin-bottom:4px">Subject</label>
      <input id="cp-ct-subject" maxlength="200" placeholder="What's this about?" style="width:100%;border:1px solid #ddd;border-radius:8px;padding:9px;font:13px system-ui;margin-bottom:8px"/>
      <label style="display:block;font-size:11px;color:#666;margin-bottom:4px">Message</label>
      <textarea id="cp-ct-msg" maxlength="4000" placeholder="Tell us more…" style="width:100%;min-height:120px;border:1px solid #ddd;border-radius:8px;padding:9px;font:13px system-ui;resize:vertical;margin-bottom:10px"></textarea>
      <button id="cp-ct-send" style="width:100%;background:#111;color:#fff;border:0;border-radius:10px;padding:12px;font-weight:600;cursor:pointer">Send message</button>
      <div style="font-size:11px;color:#888;margin-top:8px;text-align:center">Or email us directly: <a href="mailto:${EM_JS}" style="color:#6366f1">${EM_JS}</a></div>
    `;
    box.querySelector("#cp-ct-send").onclick = async () => {
      const btn = box.querySelector("#cp-ct-send");
      const name    = box.querySelector("#cp-ct-name").value.trim();
      const email   = box.querySelector("#cp-ct-email").value.trim();
      const subject = box.querySelector("#cp-ct-subject").value.trim();
      const message = box.querySelector("#cp-ct-msg").value.trim();
      if (!name || !subject || message.length < 5) return alert("Please fill in name, subject, and a message (min 5 chars).");
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return alert("Please enter a valid email address.");
      btn.disabled = true; btn.textContent = "Sending…";
      try {
        const r = await fetch("/api/contact", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, subject, message })
        });
        const d = await r.json().catch(()=>({}));
        if (!r.ok) throw new Error(d.error || "Send failed");
        box.innerHTML = `<div style="text-align:center;padding:30px 10px">
          <div style="font-size:38px">✓</div>
          <div style="font-weight:600;margin-top:8px">Message sent</div>
          <div style="font-size:12px;color:#666;margin-top:4px">We'll reply to ${escapeHtml(email)} within a few days.</div>
          <button onclick="cpCloseModal()" style="margin-top:18px;background:#111;color:#fff;border:0;border-radius:10px;padding:10px 22px;cursor:pointer">Close</button>
        </div>`;
      } catch (e) {
        btn.disabled = false; btn.textContent = "Send message";
        alert(e.message || "Couldn't send — try again.");
      }
    };
  };
  // Expose EM for the template above
  const EM_JS = EM;
  window.renderContactModal.EM = EM;

  // ─── Cookie banner (dismissable, one-time) ────────────────────────────────
  function showCookieBanner(){
    if (localStorage.getItem("cp_cookie_ack") === "1") return;
    if (document.getElementById("cp-cookie-banner")) return;
    const b = document.createElement("div");
    b.id = "cp-cookie-banner";
    b.style.cssText = "position:fixed;left:12px;right:12px;bottom:12px;z-index:9999;max-width:520px;margin:0 auto;background:#141420;color:#fff;border:1px solid #2a2a3a;border-radius:14px;padding:14px 16px;font:13px/1.5 system-ui,-apple-system,sans-serif;box-shadow:0 10px 40px rgba(0,0,0,.4)";
    b.innerHTML = '<div style="margin-bottom:10px">We use only what\'s needed to keep you signed in and remember your preferences. No ad trackers. <a href="#" onclick="cpOpen(\'cookies\');return false;" style="color:#a5b4fc">Read our cookie notice</a>.</div>' +
      '<div style="display:flex;gap:8px;justify-content:flex-end">' +
      '<button id="cp-cookie-ok" style="background:#6366f1;color:#fff;border:0;border-radius:8px;padding:8px 16px;cursor:pointer;font:600 13px system-ui">Got it</button>' +
      '</div>';
    document.body.appendChild(b);
    document.getElementById("cp-cookie-ok").onclick = () => {
      localStorage.setItem("cp_cookie_ack", "1");
      b.remove();
    };
  }
  // Show once app is up
  setTimeout(showCookieBanner, 1500);

  console.log("[CreatorPulse legal pages loaded]");
