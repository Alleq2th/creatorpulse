body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;min-height:100vh}

.cdt{font-size:11px;font-weight:600;color:var(--mu);margin-bottom:2px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%}

.cev{font-size:9px;padding:1px 4px;border-radius:3px;margin-bottom:1px;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

<script>
const NICHES={"Sports":["Football/Soccer","Basketball","Tennis","Cricket","Formula 1","Boxing","MMA/UFC","WWE Wrestling","American Football","Baseball","Ice Hockey","Golf","Rugby","Athletics/Track","Cycling","Swimming","Esports","Volleyball"],"Entertainment":["Celebrity Gossip","Music (Afrobeats)","Music (Hip-Hop)","Music (Pop)","Music (R&B)","Music (K-Pop)","Music (Amapiano)","Movies & TV","Anime","Korean Drama","Bollywood","Pop Culture"],"Gaming":["Console Gaming","PC Gaming","Mobile Gaming","Game Reviews","Twitch Streaming","YouTube Gaming","Speedrunning"],"Lifestyle":["Travel","Food & Recipes","Fitness & Gym","Mental Health","Relationships & Dating","Parenting","Minimalism","Home Decor","Pets"],"Fashion & Beauty":["Streetwear","Luxury Fashion","Skincare","Makeup","Haircare","Nails","Thrift & Vintage","Men's Fashion"],"Finance":["Personal Finance","Crypto","Stock Market","Side Hustles","Business News","Real Estate","Budgeting"],"Tech":["AI & Tech News","Gadget Reviews","Coding & Dev Life","Startups","Cybersecurity","Space & Science"],"Education":["Science","History","Language Learning","Productivity","Study Tips","Philosophy","Psychology"],"Talk & Commentary":["Yapping Videos","Hot Takes","Rants","Storytelling","Political Commentary","True Crime","Mystery & Unexplained"],"Dance & Trends":["Viral Dances","Trend Reaction","Challenge Content"],"Creator Meta":["YouTube Growth","Social Media Tips","Brand Deals","Monetization Advice"],"Professional":["Medicine & Health","Law","Marketing","Entrepreneurship","Motivational Speaking","HR & Careers"],"Culture":["Faith & Religion","African Culture","Caribbean Culture","Astrology","Self-Development"]};

const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const NC={"Football/Soccer":"#00D4FF","Basketball":"#FF6B35","Tennis":"#00FF87","Cricket":"#F59E0B","Formula 1":"#EF4444","Boxing":"#EC4899","MMA/UFC":"#8B5CF6","Music (Afrobeats)":"#FF6B35","Music (Hip-Hop)":"#A855F7","Music (K-Pop)":"#EC4899","Music (Amapiano)":"#F97316","Celebrity Gossip":"#F472B6","Movies & TV":"#06B6D4","Anime":"#8B5CF6","Crypto":"#F59E0B","Stock Market":"#10B981","Streetwear":"#FF2D78","Skincare":"#F472B6","Console Gaming":"#9B59B6","Mobile Gaming":"#7C3AED","AI & Tech News":"#00B4D8","default":"#7C3AED"};
function gc(n){return NC[n]||NC.default}

// ── API CALLS (to our own backend) ───────────────────────────────────────────
const API = window.location.origin;

async function fetchNews(niche) {
  const r = await fetch(`${API}/api/news?niche=${encodeURIComponent(niche)}`);
  const d = await r.json();
  return d.articles || [];
}

async function fetchSportsImage(query, type="player") {
  const r = await fetch(`${API}/api/sports-image?query=${encodeURIComponent(query)}&type=${type}`);
  const d = await r.json();
  return d.image || null;
}

async function fetchWikiImage(query) {
  const r = await fetch(`${API}/api/wiki-image?query=${encodeURIComponent(query)}`);
  const d = await r.json();
  return d.image || null;
}

async function generateText(system, user) {
  const r = await fetch(`${API}/api/generate`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({system, user})
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error);
  return d.text || "";
}

async function generateImage(prompt) {
  const r = await fetch(`${API}/api/generate-image`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({prompt})
  });
  const d = await r.json();
  return d.image || null;
}

async function fetchNotifications(niches) {
  const r = await fetch(`${API}/api/notifications?niches=${encodeURIComponent(niches.join(","))}`);
  const d = await r.json();
  return d.notifications || [];
}

const SYS = "You are CreatorPulse AI — world's best social media content engine. Generate platform-native, viral, ready-to-post content. Specific, punchy, direct. No meta-commentary. For JSON: ONLY valid JSON, no markdown, no extra text.";

// ── IMAGE HELPERS ─────────────────────────────────────────────────────────────
function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

function makeGraphicCanvas(headline, subjectImg, slideNum, totalSlides, accent, channel) {
  const W=1080,H=1080,cv=document.createElement("canvas");cv.width=W;cv.height=H;
  const ctx=cv.getContext("2d");
  // BG

async function loadSubjectImage(headline, niche) {
  // Try to extract subject name from headline
  const sportKeywords = ["football","soccer","basketball","tennis","cricket","boxing","mma","nba","nfl","premier league","champions league","f1"];
  const isSport = sportKeywords.some(k => (niche+headline).toLowerCase().includes(k));

  // Extract likely person/team name (first proper nouns)
  const words = headline.split(" ");
  const properNouns = words.filter(w => w.length > 2 && w[0] === w[0].toUpperCase() && w[0] !== w[0].toLowerCase());
  const subject = properNouns.slice(0,2).join(" ");

  if (!subject) return null;

  try {
    let imgUrl = null;
    if (isSport) {
      imgUrl = await fetchSportsImage(subject, "player");
      if (!imgUrl) imgUrl = await fetchSportsImage(subject, "team");
    }
    if (!imgUrl) imgUrl = await fetchWikiImage(subject);
    if (!imgUrl) return null;

    // Load image
    return new Promise((resolve) => {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => resolve(img);
      img.onerror = () => resolve(null);
      img.src = imgUrl;
      setTimeout(() => resolve(null), 5000);
    });
  } catch(e) { return null; }
}

  }
  if(o.type==="thumbnail"){
    return`<div class="oc"><div class="oh"><span class="ol">🖼️ YouTube Thumbnail</span></div><div class="iw"><img src="${o.img}" class="gi"/><div class="ia"><button class="btn bp bxs dl-btn" data-url="${o.img}" data-name="thumbnail.png">⬇ Download PNG (1280x720)</button></div></div></div>`;
  }
  if(o.type==="noface"){
    return`<div class="oc"><div class="oh"><span class="ol">🎵 TikTok No-Face Graphic</span><button class="cb" data-copy="${encodeURIComponent(o.hook+"\n\n"+o.caption)}">Copy</button></div><div class="iw"><img src="${o.img}" class="gi"/><div class="ia"><button class="btn bp bxs dl-btn" data-url="${o.img}" data-name="tiktok-graphic.png">⬇ Download Graphic</button></div></div><div class="hbl"><div class="hlb">🪝 Hook Text — show on screen</div><div class="htx">${o.hook}</div></div><div class="hbl"><div class="hlb">📝 Caption + Hashtags</div><div style="font-size:12px;line-height:1.7;white-space:pre-wrap">${o.caption}</div></div></div>`;
  }
  if(o.type==="hf-image"){
    return`<div class="oc"><div class="oh"><span class="ol">🎨 AI Generated Image</span></div><div class="iw"><img src="${o.img}" class="gi"/><div class="ia"><button class="btn bp bxs dl-btn" data-url="${o.img}" data-name="ai-image.png">⬇ Download</button></div></div></div>`;
  }
  return`<div class="oc"><div class="oh"><span class="ol">${o.label||""}</span><button class="cb" data-copy="${encodeURIComponent(o.content||"")}">Copy</button></div><div class="ob">${(o.content||"").replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div></div>`;
}

function renderCal(){
  const now=new Date(),today=now.getDate(),isCur=now.getMonth()===CAL_M&&now.getFullYear()===CAL_Y;
  const first=new Date(CAL_Y,CAL_M,1).getDay(),days=new Date(CAL_Y,CAL_M+1,0).getDate();
  const em={3:[{t:"post",x:"Post due"}],6:[{t:"event",x:"Niche event"}],10:[{t:"reminder",x:"Reminder"}],14:[{t:"post",x:"Mid-week post"},{t:"event",x:"Industry event"}],17:[{t:"reminder",x:"Weekly recap"}],21:[{t:"event",x:"Major event"}],25:[{t:"post",x:"End of week"}]};
  if(isCur)em[today]=[{t:"reminder",x:"Post today!"},{t:"post",x:"Trending now"}];
  const cells=[];for(let i=0;i<first;i++)cells.push(null);for(let d=1;d<=days;d++)cells.push(d);
  const cellsH=cells.map(d=>{if(!d)return`<div class="cc"></div>`;const isTod=isCur&&d===today,evs=(em[d]||[]).map(e=>`<div class="cev ${e.t}">${e.x}</div>`).join("");return`<div class="cc ${isTod?"td":""}"><div class="cdt ${isTod?"tod":""}">${d}</div>${evs}</div>`;}).join("");
  const mo=MONTHS[CAL_M];
  const up=[
    {date:"Today",name:"Breaking: Live Trending Stories",type:USER.niches[0]||"Your niche"},
    {date:"Tomorrow",name:"Scheduled Content Drop",type:"Your Schedule"},
    {date:mo.slice(0,3)+" "+String(Math.min(today+3,days)).padStart(2,"0"),name:"Post Reminder",type:"Calendar"},
    {date:mo.slice(0,3)+" "+String(Math.min(today+7,days)).padStart(2,"0"),name:"Weekly Recap",type:"Automated"},
    {date:mo.slice(0,3)+" "+String(Math.min(today+10,days)).padStart(2,"0"),name:"Niche Event Alert",type:USER.niches[1]||USER.niches[0]||"Trending"},
  ];
  return`<div class="cal"><div class="cgw"><div class="ch2"><div class="cm">${MONTHS[CAL_M]} ${CAL_Y}</div><div class="cn"><button id="cal-prev">&#8249;</button><button id="cal-next">&#8250;</button></div></div><div class="cday">${DAYS.map(d=>`<div class="cdl2">${d}</div>`).join("")}</div><div class="ccel">${cellsH}</div></div><div class="cbot"><div class="cbc"><div class="stit" style="font-size:13px;margin-bottom:11px">📌 Upcoming</div>${up.map(e=>`<div class="upi"><div class="upd">${e.date}</div><div class="upn">${e.name}</div><div class="upt">${e.type}</div></div>`).join("")}</div><div class="cbc"><div class="stit" style="font-size:13px;margin-bottom:9px">📋 Schedule</div><div style="font-size:12px;color:var(--mu);margin-bottom:11px">${USER.postsPerDay}x per day · <strong style="color:var(--tx)">${USER.postsPerDay*7}/week</strong></div><div style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px">${USER.niches.map(n=>`<div style="display:flex;align-items:center;gap:7px;font-size:11px"><div style="width:9px;height:9px;border-radius:50%;background:${gc(n)};flex-shrink:0"></div>${n}</div>`).join("")}</div><div style="background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.2);border-radius:var(--rs);padding:9px 11px;font-size:10px;color:var(--a2)">✦ Google Calendar sync coming soon</div></div></div></div>`;
}

function renderSet(){
  return`<div style="max-width:520px"><div class="oc" style="margin-bottom:11px"><div class="oh"><span class="ol">Profile</span></div><div style="padding:14px;display:flex;flex-direction:column;gap:10px"><div><label style="font-size:9px;color:var(--mu);display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.8px;font-weight:600">Creator Name</label><input class="ti" value="${USER.name}"/></div><div><label style="font-size:9px;color:var(--mu);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.8px;font-weight:600">Active Niches</label><div style="display:flex;flex-wrap:wrap;gap:5px">${USER.niches.map(n=>`<span style="padding:3px 10px;border-radius:99px;background:${gc(n)}22;border:1px solid ${gc(n)}44;color:${gc(n)};font-size:11px;font-weight:600">${n}</span>`).join("")}</div></div></div></div><div class="oc"><div class="oh"><span class="ol">Plan</span></div><div style="padding:14px"><div style="font-family:'Syne',sans-serif;font-weight:700;font-size:15px;margin-bottom:3px">Free Plan — Fully Unlimited</div><div style="font-size:11px;color:var(--mu);margin-bottom:11px">Powered by Groq AI + Hugging Face + Live News.</div><div style="background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.2);border-radius:var(--rs);padding:11px;font-size:11px;color:var(--gr);line-height:1.8">✓ Live news from 130+ niches via NewsAPI<br>✓ Real player faces & team logos via TheSportsDB<br>✓ AI text generation via Groq (Llama 3 70B)<br>✓ AI image generation via Hugging Face FLUX<br>✓ Carousels, thumbnails, TikTok graphics<br>✓ Download everything as PNG<br>✓ Notification bell for breaking stories</div></div></div></div>`;
}

// ── BIND APP ──────────────────────────────────────────────────────────────────
// ── SURGICAL CARD UPDATE (avoids full-page re-render on every tap) ───────────
function updateSingleCard(tid){
  const t = ALL_TRENDS.find(x=>x.id===tid);
  if(!t) return;
  const oldEl = document.getElementById("tc-"+tid);
  if(!oldEl){ render(); bindApp(); return; }
  const wrap = document.createElement("div");
  wrap.innerHTML = renderTC(t);
  const newEl = wrap.firstElementChild;
  oldEl.replaceWith(newEl);
  bindCard(newEl, tid);
}

function bindCard(cardEl, tid){
  cardEl.querySelector(".th")?.addEventListener("click", async ()=>{
    EXP[tid]=!EXP[tid];
    if(EXP[tid]&&!AP[tid])AP[tid]=USER.primaryPlatform;
    if(EXP[tid]&&!AT[tid])AT[tid]=PTYPES[USER.primaryPlatform]?.[0]||"";
    updateSingleCard(tid);
    if(EXP[tid]&&!RECS[tid]){
      const t=ALL_TRENDS.find(x=>x.id===tid);
      if(t){const rec=await generateText("Give a one-sentence content recommendation. Direct, specific, no preamble.",`Niches: ${USER.niches.join(", ")}. Story: "${t.headline}". Best platform and format?`);RECS[tid]=rec;updateSingleCard(tid);}
    }
  });
  cardEl.querySelectorAll(".ptab[data-tid]").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();AP[tid]=el.dataset.pid;AT[tid]=PTYPES[el.dataset.pid]?.[0]||"";updateSingleCard(tid);}));
  cardEl.querySelectorAll(".ctp[data-tid]").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();AT[tid]=el.dataset.ct;updateSingleCard(tid);}));
  cardEl.querySelectorAll(".gen-btn").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();gen(tid,false);}));
  cardEl.querySelectorAll(".gen-all-btn").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();gen(tid,true);}));
  cardEl.querySelectorAll(".cb[data-copy]").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();navigator.clipboard.writeText(decodeURIComponent(el.dataset.copy));el.textContent="✓ Copied";el.classList.add("copied");setTimeout(()=>{el.textContent="Copy";el.classList.remove("copied");},2000);}));
  cardEl.querySelectorAll(".dl-btn").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();const a=document.createElement("a");a.href=el.dataset.url;a.download=el.dataset.name;document.body.appendChild(a);a.click();document.body.removeChild(a);}));
}

function bindApp(){
  document.querySelectorAll(".ni[data-tab]").forEach(el=>el.addEventListener("click",()=>{TAB=el.dataset.tab;render();bindApp();}));
  document.getElementById("cal-prev")?.addEventListener("click",()=>{if(CAL_M===0){CAL_M=11;CAL_Y--;}else CAL_M--;render();bindApp();});
  document.getElementById("cal-next")?.addEventListener("click",()=>{if(CAL_M===11){CAL_M=0;CAL_Y++;}else CAL_M++;render();bindApp();});
  // Bell
  document.getElementById("bell-btn")?.addEventListener("click",e=>{e.stopPropagation();NOTIF_OPEN=!NOTIF_OPEN;render();bindApp();});
  if(NOTIF_OPEN){
    document.addEventListener("click",function closeDD(e){
      if(!e.target.closest("#bell-wrap")){NOTIF_OPEN=false;render();bindApp();}
      document.removeEventListener("click",closeDD);
    },{once:true});
  }
  // Trends — each card binds its own scoped listeners (no full-page rebuild on tap)
  document.querySelectorAll(".tc[id^='tc-']").forEach(cardEl=>{
    const tid = cardEl.id.replace("tc-","");
    bindCard(cardEl, tid);
  });
}

// ── GENERATE ──────────────────────────────────────────────────────────────────
async function gen(tid, all) {
  const t=ALL_TRENDS.find(x=>x.id===tid);if(!t)return;
  const ap=AP[tid]||USER.primaryPlatform,at=AT[tid]||PTYPES[ap]?.[0]||"",accent=gc(t.niche);
  LOAD[tid]=true;OUTS[tid]=[];updateSingleCard(tid);
  try{
    const types=all?(PTYPES[ap]||[]):[at];const res=[];
    // Pre-load subject image for graphics
    const subjectImg = await loadSubjectImage(t.headline, t.niche);

    for(const ct of types){
      if(ct==="IG Carousel"){
        let sc=5;
        try{const cr=await generateText('Return ONLY valid JSON: {"slideCount":number}',`Story: "${t.headline}". Recommend Instagram carousel slide count 3-7.`);sc=JSON.parse(cr).slideCount||5;}catch{}
        let slides=[];
        try{const sr=await generateText(`Return ONLY a valid JSON array of ${sc} objects: [{"slideNum":1,"title":"bold hook","body":"2-3 punchy sentences"}]. No markdown.`,`Create a ${sc}-slide viral Instagram carousel for ${t.niche} creator. Story: "${t.headline}". Summary: ${t.summary}`);slides=JSON.parse(sr);}
        catch{slides=[{slideNum:1,title:t.headline,body:t.summary||""}];}
        const images=slides.map((s,i)=>makeGraphicCanvas(s.title||t.headline,subjectImg,i+1,slides.length,accent,USER.name));
        const cap=await generateText(SYS,`Instagram caption + 10 hashtags for ${t.niche} carousel: "${t.headline}". Punchy, ready to post.`);
        res.push({type:"carousel",slides,images});res.push({type:"text",label:"📝 Caption + Hashtags",content:cap});
      }else if(ct==="Thumbnail"){
        let hl=t.headline.toUpperCase().split(" ").slice(0,5).join(" ");
        try{const tr=await generateText('Return ONLY valid JSON: {"headline":"MAX 6 WORDS ALL CAPS SHOCKING"}',`${t.niche}: "${t.headline}". World-class YouTube thumbnail. MrBeast level.`);hl=JSON.parse(tr).headline||hl;}catch{}
        res.push({type:"thumbnail",img:makeThumbnailCanvas(hl,subjectImg,USER.name,accent)});
      }else if(ct==="TikTok No-Face Graphic"){
        const hook=await generateText(SYS,"TikTok hook. MAX 6 WORDS. ALL CAPS. Shocking. Return ONLY the hook text, nothing else.");
        const cap=await generateText(SYS,`TikTok caption + 6 hashtags for ${t.niche}: "${t.headline}". Ready to post.`);
        res.push({type:"noface",hook:hook.trim(),caption:cap,img:makeGraphicCanvas(hook.trim()||t.headline,subjectImg,1,1,accent,USER.name)});
      }else if(ct==="TikTok Script"){
        let ld={length:"short",targetSeconds:30,reason:"Quick punchy take"};
        try{const lr=await generateText('Return ONLY valid JSON: {"length":"short","targetSeconds":30,"reason":"one sentence"}',`${t.niche}: "${t.headline}". Best TikTok length?`);ld=JSON.parse(lr);}catch{}
        const s=await generateText(SYS,`${ld.length==="long"?"60-90 second":"15-30 second"} TikTok script for ${t.niche}. Topic: "${t.headline}". [HOOK 3sec], [BODY], [CTA]. Viral.`);
        res.push({type:"text",label:`🎵 TikTok Script (${ld.length==="long"?"Long":"Short"} ~${ld.targetSeconds}s) — ${ld.reason}`,content:s});
      }else if(ct==="Documentary Script"){
        const s=await generateText(SYS,`YouTube documentary script for ${t.niche}. Topic: "${t.headline}". Cold open, Act 1 background, Act 2 conflict, Act 3 analysis, Outro+CTA. ~800 words. [B-ROLL SUGGESTION] markers. Cinematic.`);
        res.push({type:"text",label:"🎬 Documentary Script",content:s});
      }else if(ct==="Long Form Script"){
        const s=await generateText(SYS,`Full YouTube long-form script for ${t.niche}. Topic: "${t.headline}". Hook, Intro, 3-4 sections, Conclusion, CTA. ~900 words.`);
        res.push({type:"text",label:"▶️ Long Form Script",content:s});
      }else if(ct==="YouTube Short Script"){
        const s=await generateText(SYS,`60 sec YouTube Short for ${t.niche}. Topic: "${t.headline}". Hook in 3 seconds, strong CTA.`);
        res.push({type:"text",label:"▶️ YouTube Short",content:s});
      }else if(ct==="Title + Description"){
        const s=await generateText(SYS,`3 YouTube titles + SEO description for ${t.niche}. Topic: "${t.headline}". Titles: clickbait. Description: keywords + hashtags.`);
        res.push({type:"text",label:"▶️ Title + Description",content:s});
      }else if(ct==="Thread (5 tweets)"){
        const s=await generateText(SYS,`Viral 5-tweet X thread for ${t.niche}. Topic: "${t.headline}". Format: "Tweet 1/5: [text]". Max 280 chars. Punchy. Last tweet: CTA.`);
        res.push({type:"text",label:"𝕏 Thread",content:s});
      }else if(ct==="IG Reel Script"){
        const s=await generateText(SYS,`30-60 sec Instagram Reel script for ${t.niche}. Topic: "${t.headline}". [HOOK],[BODY],[CTA]. Viral.`);
        res.push({type:"text",label:"📸 IG Reel Script",content:s});
      }else{
        const p=PLATS.find(x=>x.id===ap);
        const s=await generateText(SYS,`"${ct}" for ${t.niche} on ${p?.label||ap}. Story: "${t.headline}". ${t.summary}. Viral, ready to post.`);
        res.push({type:"text",label:`${p?.icon||""} ${ct}`,content:s});
      }
    }
    OUTS[tid]=res;
  }catch(e){OUTS[tid]=[{type:"text",label:"Error",content:"Generation failed: "+(e.message||"Unknown error")+"\n\nCheck that your Groq API key is set correctly in Render's environment variables."}];}
  LOAD[tid]=false;updateSingleCard(tid);
}

render();
</script>
