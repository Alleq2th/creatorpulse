<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CreatorPulse — AI Content Engine</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="theme-color" content="#7C3AED">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060810;
  --sf:rgba(12,17,32,0.85);
  --s2:rgba(17,24,39,0.7);
  --s3:#1a2235;
  --br:rgba(255,255,255,0.06);
  --pr:#7C3AED;
  --pl:#A855F7;
  --ac:#F97316;
  --a2:#06B6D4;
  --tx:#F1F5F9;
  --mu:rgba(148,163,184,0.8);
  --gr:#10B981;
  --r:16px;
  --rs:10px;
  --glass: rgba(255,255,255,0.03);
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
}
body{
  background:var(--bg);
  color:var(--tx);
  font-family:'Outfit',sans-serif;
  min-height:100vh;
  background-image: radial-gradient(ellipse at 20% 50%, rgba(124,58,237,0.08) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 20%, rgba(249,115,22,0.05) 0%, transparent 50%);
  background-attachment:fixed;
}
.app{display:flex;min-height:100vh}
.sidebar{
  width:240px;
  min-height:100vh;
  background:var(--sf);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-right:1px solid var(--br);
  display:flex;
  flex-direction:column;
  padding:20px 14px;
  position:fixed;
  left:0;top:0;bottom:0;
  z-index:10;
  overflow-y:auto
}
.logo{
  display:flex;
  align-items:center;
  gap:12px;
  padding:6px 8px;
  margin-bottom:20px
}
.lm{
  width:38px;height:38px;
  border-radius:12px;
  background:linear-gradient(135deg,var(--pr),var(--ac));
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  position:relative;
  flex-shrink:0;
  box-shadow:0 0 30px rgba(124,58,237,0.3)
}
.lm::after{
  content:'';
  position:absolute;
  inset:-3px;
  border-radius:15px;
  background:linear-gradient(135deg,var(--pr),var(--a2),var(--ac));
  z-index:-1;
  animation:pr 3s ease-in-out infinite;
  opacity:0.4
}
@keyframes pr{0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:0.7;transform:scale(1.08)}}
.lt{
  font-family:'Orbitron',sans-serif;
  font-weight:800;
  font-size:16px;
  letter-spacing:0.5px
}
.lt span{color:var(--pl)}
.ns{
  font-size:9px;
  font-weight:600;
  color:var(--mu);
  text-transform:uppercase;
  letter-spacing:1.5px;
  padding:12px 8px 6px;
  margin-top:4px
}
.ni{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border-radius:var(--rs);
  cursor:pointer;
  font-size:13px;
  font-weight:500;
  color:var(--mu);
  transition:all 0.2s;
  border:none;
  background:none;
  width:100%;
  font-family:'Outfit',sans-serif
}
.ni:hover{background:rgba(255,255,255,0.04);color:var(--tx)}
.ni.active{
  background:rgba(124,58,237,0.12);
  color:var(--pl);
  font-weight:600;
  box-shadow:inset 0 0 20px rgba(124,58,237,0.05)
}
.ni .icon{font-size:16px;width:22px;text-align:center}
.npills{
  margin:4px 6px 12px;
  display:flex;
  flex-direction:column;
  gap:4px
}
.npill{
  padding:6px 10px;
  background:rgba(255,255,255,0.03);
  border-radius:8px;
  border:1px solid var(--br);
  font-size:11px;
  font-weight:500;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  color:var(--mu)
}
.npill .dot{
  display:inline-block;
  width:6px;height:6px;
  border-radius:50%;
  margin-right:6px;
  vertical-align:middle
}
.main{
  margin-left:240px;
  flex:1;
  display:flex;
  flex-direction:column;
  min-height:100vh
}
.topbar{
  padding:16px 32px;
  border-bottom:1px solid var(--br);
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:var(--sf);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  position:sticky;
  top:0;
  z-index:5
}
.topbar-left h1{
  font-family:'Orbitron',sans-serif;
  font-size:18px;
  font-weight:700;
  letter-spacing:0.3px
}
.topbar-left p{
  font-size:12px;
  color:var(--mu);
  margin-top:2px;
  font-weight:400
}
.topbar-right{
  display:flex;
  align-items:center;
  gap:10px
}
.content{
  padding:28px 32px;
  flex:1
}
.btn{
  padding:8px 18px;
  border-radius:var(--rs);
  border:none;
  cursor:pointer;
  font-size:12px;
  font-weight:600;
  transition:all 0.2s;
  font-family:'Outfit',sans-serif;
  display:inline-flex;
  align-items:center;
  gap:6px
}
.bp{
  background:linear-gradient(135deg,var(--pr),var(--pl));
  color:#fff;
  box-shadow:0 4px 20px rgba(124,58,237,0.25)
}
.bp:hover:not(:disabled){
  transform:translateY(-2px);
  box-shadow:0 6px 30px rgba(124,58,237,0.35)
}
.ba{
  background:linear-gradient(135deg,var(--ac),#F97316);
  color:#fff;
  box-shadow:0 4px 20px rgba(249,115,22,0.25)
}
.ba:hover:not(:disabled){
  transform:translateY(-2px);
  box-shadow:0 6px 30px rgba(249,115,22,0.35)
}
.bs{
  background:rgba(255,255,255,0.04);
  color:var(--tx);
  border:1px solid var(--br)
}
.bs:hover:not(:disabled){
  background:rgba(255,255,255,0.08)
}
.bg2{
  background:transparent;
  color:var(--mu);
  border:1px solid var(--br)
}
.bg2:hover:not(:disabled){
  border-color:var(--pr);
  color:var(--pl)
}
.bsm{padding:6px 14px;font-size:11px}
.bxs{padding:4px 10px;font-size:10px}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important}
.ti{
  background:rgba(255,255,255,0.04);
  border:1px solid var(--br);
  border-radius:var(--rs);
  padding:10px 14px;
  color:var(--tx);
  font-size:13px;
  font-family:'Outfit',sans-serif;
  outline:none;
  width:100%;
  transition:border-color 0.2s
}
.ti:focus{border-color:var(--pr)}
.ti::placeholder{color:var(--mu)}
.auth-wrap{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px 20px;
  background:var(--bg)
}
.auth-card{
  background:var(--sf);
  backdrop-filter:blur(20px);
  border:1px solid var(--br);
  border-radius:24px;
  padding:44px;
  max-width:440px;
  width:100%;
  box-shadow:var(--shadow)
}
.auth-logo{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:30px;
  justify-content:center
}
.auth-title{
  font-family:'Orbitron',sans-serif;
  font-size:26px;
  font-weight:800;
  margin-bottom:6px;
  text-align:center;
  letter-spacing:0.3px
}
.auth-sub{
  color:var(--mu);
  font-size:13px;
  margin-bottom:26px;
  text-align:center;
  line-height:1.6
}
.auth-field{margin-bottom:14px}
.auth-label{
  font-size:10px;
  color:var(--mu);
  display:block;
  margin-bottom:5px;
  text-transform:uppercase;
  letter-spacing:1px;
  font-weight:600
}
.auth-input{
  background:rgba(255,255,255,0.04);
  border:1px solid var(--br);
  border-radius:var(--rs);
  padding:11px 14px;
  color:var(--tx);
  font-size:14px;
  font-family:'Outfit',sans-serif;
  outline:none;
  width:100%;
  transition:border-color 0.2s
}
.auth-input:focus{border-color:var(--pr)}
.auth-input::placeholder{color:var(--mu)}
.auth-btn{
  width:100%;
  padding:12px;
  border-radius:var(--rs);
  border:none;
  cursor:pointer;
  font-size:14px;
  font-weight:700;
  transition:all 0.2s;
  font-family:'Outfit',sans-serif;
  margin-top:6px
}
.auth-btn-primary{
  background:linear-gradient(135deg,var(--pr),var(--pl));
  color:white;
  box-shadow:0 4px 20px rgba(124,58,237,0.25)
}
.auth-btn-primary:hover:not(:disabled){
  transform:translateY(-2px);
  box-shadow:0 6px 30px rgba(124,58,237,0.35)
}
.auth-btn-secondary{
  background:rgba(255,255,255,0.04);
  color:var(--tx);
  border:1px solid var(--br);
  margin-top:10px
}
.auth-btn-secondary:hover:not(:disabled){
  background:rgba(255,255,255,0.08)
}
.auth-btn:disabled{opacity:0.5;cursor:not-allowed}
.auth-err{
  background:rgba(239,68,68,0.1);
  border:1px solid rgba(239,68,68,0.2);
  border-radius:var(--rs);
  padding:10px 14px;
  font-size:12px;
  color:#FCA5A5;
  margin-bottom:14px
}
.auth-link{
  font-size:12px;
  color:var(--pl);
  cursor:pointer;
  text-align:center;
  margin-top:16px;
  display:block
}
.auth-link:hover{text-decoration:underline}
.auth-divider{
  display:flex;
  align-items:center;
  gap:12px;
  margin:18px 0;
  color:var(--mu);
  font-size:11px
}
.auth-divider::before,.auth-divider::after{
  content:'';
  flex:1;
  height:1px;
  background:var(--br)
}
.landing-wrap{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px 20px;
  text-align:center;
  background:var(--bg);
  position:relative;
  overflow:hidden
}
.landing-wrap::before{
  content:'';
  position:absolute;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background:radial-gradient(ellipse at 30% 50%, rgba(124,58,237,0.08) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 30%, rgba(249,115,22,0.05) 0%, transparent 50%);
  pointer-events:none;
  animation:heroGlow 20s ease-in-out infinite alternate
}
@keyframes heroGlow{
  0%{transform:translate(0,0) scale(1)}
  100%{transform:translate(5%,5%) scale(1.1)}
}
.landing-content{
  position:relative;
  z-index:1;
  max-width:700px
}
.landing-badge{
  display:inline-block;
  padding:4px 16px;
  border-radius:99px;
  background:rgba(124,58,237,0.12);
  border:1px solid rgba(124,58,237,0.15);
  color:var(--pl);
  font-size:11px;
  font-weight:600;
  letter-spacing:0.5px;
  margin-bottom:20px
}
.landing-title{
  font-family:'Orbitron',sans-serif;
  font-size:52px;
  font-weight:900;
  line-height:1.08;
  margin-bottom:14px;
  letter-spacing:-0.5px
}
.landing-title span{
  background:linear-gradient(135deg,var(--pl),var(--ac));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent
}
.landing-sub{
  color:var(--mu);
  font-size:17px;
  max-width:540px;
  line-height:1.7;
  margin:0 auto 38px
}
.landing-features{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
  max-width:560px;
  margin-bottom:38px
}
.landing-feat{
  background:var(--sf);
  backdrop-filter:blur(20px);
  border:1px solid var(--br);
  border-radius:var(--r);
  padding:18px 20px;
  text-align:left;
  transition:all 0.2s
}
.landing-feat:hover{
  border-color:rgba(124,58,237,0.3);
  transform:translateY(-2px)
}
.landing-feat-icon{font-size:24px;margin-bottom:6px}
.landing-feat-title{
  font-size:14px;
  font-weight:700;
  margin-bottom:3px
}
.landing-feat-desc{
  font-size:11px;
  color:var(--mu);
  line-height:1.5
}
.landing-btns{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
  justify-content:center
}
.landing-btn{
  padding:14px 32px;
  border-radius:var(--rs);
  border:none;
  cursor:pointer;
  font-size:15px;
  font-weight:700;
  transition:all 0.2s;
  font-family:'Outfit',sans-serif
}
.landing-btn-primary{
  background:linear-gradient(135deg,var(--pr),var(--pl));
  color:white;
  box-shadow:0 4px 30px rgba(124,58,237,0.3)
}
.landing-btn-primary:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 40px rgba(124,58,237,0.4)
}
.landing-btn-secondary{
  background:rgba(255,255,255,0.04);
  color:var(--tx);
  border:1px solid var(--br)
}
.landing-btn-secondary:hover{
  background:rgba(255,255,255,0.08)
}
.stit{
  font-family:'Orbitron',sans-serif;
  font-size:16px;
  font-weight:700;
  margin-bottom:14px;
  letter-spacing:0.3px
}
.tlist{
  display:flex;
  flex-direction:column;
  gap:8px
}
.tc{
  background:var(--sf);
  backdrop-filter:blur(20px);
  border:1px solid var(--br);
  border-radius:var(--r);
  overflow:hidden;
  transition:all 0.25s
}
.tc.exp{
  border-color:rgba(124,58,237,0.3);
  box-shadow:0 0 40px rgba(124,58,237,0.05)
}
.th{
  padding:16px 20px;
  cursor:pointer;
  display:flex;
  align-items:flex-start;
  gap:14px;
  transition:background 0.15s
}
.th:hover{background:rgba(255,255,255,0.015)}
.trend-img{
  width:60px;height:60px;
  border-radius:10px;
  object-fit:cover;
  flex-shrink:0;
  background:var(--s2);
  border:1px solid var(--br)
}
.trend-img-placeholder{
  width:60px;height:60px;
  border-radius:10px;
  flex-shrink:0;
  background:var(--s2);
  border:1px solid var(--br);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px
}
.rb{
  background:rgba(249,115,22,0.12);
  border:1px solid rgba(249,115,22,0.2);
  color:var(--ac);
  font-size:10px;
  font-weight:700;
  padding:2px 8px;
  border-radius:99px;
  white-space:nowrap;
  flex-shrink:0;
  margin-top:2px
}
.ntb{
  font-size:10px;
  padding:2px 8px;
  border-radius:99px;
  margin-left:2px;
  font-weight:600;
  flex-shrink:0;
  margin-top:2px
}
.hl{
  font-size:14px;
  font-weight:600;
  line-height:1.4;
  flex:1
}
.tmeta{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-top:6px
}
.ttg{
  font-size:10px;
  padding:2px 8px;
  border-radius:99px;
  background:rgba(255,255,255,0.04);
  color:var(--mu)
}
.tsc{
  font-size:10px;
  padding:2px 8px;
  border-radius:99px;
  background:rgba(16,185,129,0.1);
  color:var(--gr);
  font-weight:600
}
.cv{
  font-size:10px;
  color:var(--mu);
  margin-left:6px;
  transition:transform 0.2s;
  flex-shrink:0;
  margin-top:4px
}
.cv.open{transform:rotate(180deg)}
.cp{
  border-top:1px solid var(--br);
  padding:18px 20px;
  background:rgba(0,0,0,0.15)
}
.sb2{
  font-size:12px;
  color:var(--mu);
  line-height:1.7;
  margin-bottom:14px;
  padding:12px 14px;
  background:rgba(255,255,255,0.02);
  border-radius:var(--rs);
  border-left:3px solid var(--pr)
}
.ar{
  background:rgba(124,58,237,0.06);
  border:1px solid rgba(124,58,237,0.12);
  border-radius:var(--rs);
  padding:8px 14px;
  font-size:11px;
  color:var(--pl);
  margin-bottom:12px;
  display:flex;
  gap:8px;
  align-items:flex-start;
  line-height:1.5
}
.ptabs{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-bottom:12px
}
.ptab{
  padding:6px 14px;
  border-radius:99px;
  border:1px solid var(--br);
  font-size:11px;
  cursor:pointer;
  transition:all 0.15s;
  background:transparent;
  color:var(--mu);
  font-family:'Outfit',sans-serif
}
.ptab:hover{border-color:var(--pr);color:var(--tx)}
.ptab.active{
  background:linear-gradient(135deg,var(--pr),var(--pl));
  border-color:var(--pr);
  color:#fff;
  font-weight:600
}
.ctps{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-bottom:14px
}
.ctp{
  padding:5px 12px;
  border-radius:var(--rs);
  border:1px solid var(--br);
  font-size:10px;
  cursor:pointer;
  transition:all 0.15s;
  background:transparent;
  color:var(--mu);
  font-family:'Outfit',sans-serif
}
.ctp:hover{color:var(--tx);border-color:var(--mu)}
.ctp.active{
  border-color:var(--ac);
  color:var(--ac);
  background:rgba(249,115,22,0.06)
}
.gr2{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
  margin-bottom:14px
}
.oa{
  display:flex;
  flex-direction:column;
  gap:8px
}
.oc{
  background:rgba(255,255,255,0.02);
  border:1px solid var(--br);
  border-radius:var(--r);
  overflow:hidden
}
.oh{
  padding:10px 16px;
  border-bottom:1px solid var(--br);
  display:flex;
  align-items:center;
  justify-content:space-between
}
.ol{
  font-size:10px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.8px;
  color:var(--pl)
}
.cb{
  padding:4px 12px;
  border-radius:var(--rs);
  border:1px solid var(--br);
  background:transparent;
  color:var(--mu);
  font-size:10px;
  cursor:pointer;
  transition:all 0.15s;
  font-family:'Outfit',sans-serif
}
.cb:hover{border-color:var(--gr);color:var(--gr)}
.cb.copied{border-color:var(--gr)!important;color:var(--gr)!important}
.ob{
  padding:14px;
  font-size:12px;
  line-height:1.8;
  color:var(--tx);
  white-space:pre-wrap
}
.slds{padding:12px;display:flex;flex-direction:column;gap:8px}
.sld{
  background:rgba(255,255,255,0.02);
  border-radius:var(--rs);
  padding:12px;
  border-left:3px solid var(--pr)
}
.sn{
  font-size:9px;
  color:var(--pl);
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.8px;
  margin-bottom:3px
}
.st2{font-size:12px;font-weight:700;margin-bottom:3px}
.sbd{font-size:11px;line-height:1.6;color:rgba(241,245,249,0.85)}
.iw{padding:12px}
.gi{width:100%;border-radius:var(--rs);display:block}
.ia{display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap}
.ino{font-size:10px;color:var(--mu)}
.hbl{
  margin:0 12px 12px;
  background:rgba(255,255,255,0.02);
  border-radius:var(--rs);
  padding:12px;
  border:1px solid var(--br)
}
.hlb{
  font-size:9px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.8px;
  color:var(--ac);
  margin-bottom:4px
}
.htx{font-size:14px;font-weight:700}
.output-footer{
  padding:8px 14px;
  border-top:1px solid var(--br);
  display:flex;
  justify-content:flex-end;
  gap:6px
}
.bell-wrap{position:relative;cursor:pointer}
.bell-btn{
  width:36px;height:36px;
  border-radius:50%;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--br);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  cursor:pointer;
  transition:all 0.15s
}
.bell-btn:hover{border-color:var(--pr)}
.bell-dot{
  position:absolute;

async function loadSubjectImage(headline, niche, articleImageUrl) {
  if (articleImageUrl) {
    const proxiedUrl = `${API}/api/image-proxy?url=${encodeURIComponent(articleImageUrl)}`;
    const realImg = await loadImageElement(proxiedUrl);
    if (realImg) return realImg;
  }
  const sportKeywords = ["football","soccer","basketball","tennis","cricket","boxing","mma","nba","nfl","premier league","champions league","f1"];
  const isSport = sportKeywords.some(k => (niche+headline).toLowerCase().includes(k));
  const words = headline.split(" ");
  const properNouns = words.filter(w => w.length > 2 && w[0] === w[0].toUpperCase() && w[0] !== w[0].toLowerCase());
  const subject = properNouns.slice(0,2).join(" ");
  if (!subject) return null;
  try {
    let imgUrl = null;
    if (isSport) {
      imgUrl = await fetchSportsImage(subject, "player");
      if (!imgUrl) imgUrl = await fetchSportsImage(subject, "team");
    }
    if (!imgUrl) imgUrl = await fetchWikiImage(subject);
    if (!imgUrl) return null;
    return await loadImageElement(imgUrl);
  } catch(e) { return null; }
}

function loadImageElement(url) {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = url;
    setTimeout(() => resolve(null), 6000);
  });
}

function extractJSON(text) {
  const match = text.match(/\{[\s\S]*\}/);
  return match ? JSON.parse(match[0]) : null;
}

function openGoogleCalendar(post) {
  const title = encodeURIComponent(post.headline);
  const date = post.scheduled_date || new Date().toISOString().split('T')[0];
  const dateStr = date.replace(/-/g, '');
  const details = encodeURIComponent(`Content: ${post.content_type}\nNiche: ${post.niche}\nPlatform: ${post.platform}`);
  const url = `https://calendar.google.com/calendar/r/eventedit?text=${title}&dates=${dateStr}/${dateStr}&details=${details}`;
  window.open(url, '_blank');
}

      if (token && user) {
        AUTH_TOKEN = token;
        USER = user;
        AUTH_MODE = "app";

    "Console Gaming": ["IGN", "GameSpot", "PCGamer"],
    "PC Gaming": ["IGN", "GameSpot", "PCGamer"],
    "Mobile Gaming": ["IGN", "GameSpot", "PCGamer"],
    "Anime": ["AnimeNews", "Crunchyroll", "Funimation"],
    "Travel": ["TravelLeisure", "CondéNast", "LonelyPlanet"],
    "Food & Recipes": ["NYTFood", "Food52", "BonAppetit"],
    "Streetwear": ["Vogue", "GQ", "Fashionista"],
    "Luxury Fashion": ["Vogue", "GQ", "Fashionista"],
    "Business News": ["Bloomberg", "ReutersBiz", "FT"],
    "default": ["BreakingNews", "Reuters", "AP"]
  };

  for (const niche of USER.niches) {
    const handlesToFetch = nicheHandles[niche] || nicheHandles["default"];
    for (const handle of handlesToFetch) {
      try {
        const r = await fetch(`${API}/api/twitter-feed?handle=${handle}&_=${Date.now()}`, { cache: 'no-store' });
        const d = await r.json();
        if (d.articles) {
          d.articles.forEach(a => {
            a.niche = niche;
            if (a.image && !a.image.startsWith('http')) {
              a.image = `https://nitter.net${a.image}`;
            }
            if (a.image) {
              a.image = `${API}/api/image-proxy?url=${encodeURIComponent(a.image)}`;
            }
          });
          ALL_TRENDS.push(...d.articles);
        }
      } catch(e) { console.log("Twitter fetch error for", handle); }
    }
  }

  const seen = new Set();
  ALL_TRENDS = ALL_TRENDS.filter(t => {
    const key = t.headline.toLowerCase().trim();
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  ALL_TRENDS.sort((a,b) => b.score - a.score);
  if (TAB === "generate") { render(); bindApp(); }

function renderCal(){

  SCHEDULE_DATA.forEach(post => {
    if (post.scheduled_date) {
      const day = new Date(post.scheduled_date).getDate();
      if (!postsByDate[day]) postsByDate[day] = [];
      postsByDate[day].push(post);
    }

  const em={3:[{t:"post",x:"Post due"}],6:[{t:"event",x:"Niche event"}],10:[{t:"reminder",x:"Reminder"}],14:[{t:"post",x:"Mid-week post"},{t:"event",x:"Industry event"}],17:[{t:"reminder",x:"Weekly recap"}],21:[{t:"event",x:"Major event"}],25:[{t:"post",x:"End of week"}]};

  const cells=[];for(let i=0;i<first;i++)cells.push(null);for(let d=1;d<=days;d++)cells.push(d);
  const cellsH=cells.map(d=>{

    const countBadge = dayPosts.length > 0 ? `<div style="font-size:8px;color:var(--pl);margin-top:2px">📌 ${dayPosts.length}</div>` : "";

  const wrap = document.createElement("div");

  bindCard(newEl, tid);

function bindCard(cardEl, tid){
  cardEl.querySelector(".th")?.addEventListener("click", async ()=>{
    EXP[tid]=!EXP[tid];

    if(EXP[tid]&&!AT[tid])AT[tid]=PTYPES[USER.primaryPlatform]?.[0]||"";

    if(EXP[tid]&&!RECS[tid]){
      const t=ALL_TRENDS.find(x=>x.id===tid);

  });
  cardEl.querySelectorAll(".ptab[data-tid]").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();AP[tid]=el.dataset.pid;AT[tid]=PTYPES[el.dataset.pid]?.[0]||"";updateSingleCard(tid);}));
  cardEl.querySelectorAll(".ctp[data-tid]").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();AT[tid]=el.dataset.ct;updateSingleCard(tid);}));
  cardEl.querySelectorAll(".gen-btn").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();gen(tid,false);}));
  cardEl.querySelectorAll(".gen-all-btn").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();gen(tid,true);}));
  cardEl.querySelectorAll(".cb[data-copy]").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();navigator.clipboard.writeText(decodeURIComponent(el.dataset.copy));el.textContent="✓ Copied";el.classList.add("copied");setTimeout(()=>{el.textContent="Copy";el.classList.remove("copied");},2000);}));
  cardEl.querySelectorAll(".dl-btn").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();const a=document.createElement("a");a.href=el.dataset.url;a.download=el.dataset.name;document.body.appendChild(a);a.click();document.body.removeChild(a);}));
}

async function saveOutputToCalendar(tid, outputIndex) {
  const t = ALL_TRENDS.find(x => x.id === tid);
  if (!t) return;
  const output = OUTS[tid]?.[outputIndex];
  if (!output) return;

  const ap = AP[tid] || USER.primaryPlatform;
  let contentType = "Script";
  if (output.type === "carousel") contentType = "Carousel";
  else if (output.type === "thumbnail") contentType = "Thumbnail";
  else if (output.type === "noface") contentType = "Graphic";

  const today = new Date();
  const year = today.getFullYear();
  const month = String(today.getMonth() + 1).padStart(2, '0');
  const day = String(today.getDate()).padStart(2, '0');
  const scheduledDate = `${year}-${month}-${day}`;

  try {
    const res = await fetch(`${API}/api/save-post`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        token: AUTH_TOKEN,
        headline: t.headline,
        niche: t.niche,
        platform: ap,
        contentType: contentType,
        content: output,
        scheduledDate: scheduledDate
      })
    });
    const data = await res.json();
    if (data.success) {
      showToast("✅ Saved to calendar!");
      if (TAB === "saved") loadSavedPosts();
      if (TAB === "calendar") loadSchedule();
    } else {
      showToast("❌ Save failed: " + (data.error || "Unknown error"));
    }
  } catch (e) {
    showToast("❌ Error saving: " + e.message);
  }
}

async function connectGoogleCalendar() {
  try {
    const r = await fetch(`${API}/api/google-auth-url?token=${AUTH_TOKEN}`);
    const d = await r.json();
    if (d.url) {
      window.open(d.url, '_blank');
    } else {
      showToast("❌ Failed to get auth URL");
    }
  } catch (e) {
    showToast("❌ Error: " + e.message);
  }
}

function bindApp(){
  document.querySelectorAll(".ni[data-tab]").forEach(el => {
    el.addEventListener("click", () => {
      TAB = el.dataset.tab;
      render();
      bindApp();
      if (TAB === "calendar") loadSchedule();
      if (TAB === "saved") loadSavedPosts();
    });
  });
  
  document.getElementById("cal-prev")?.addEventListener("click",()=>{if(CAL_M===0){CAL_M=11;CAL_Y--;}else CAL_M--;loadSchedule();render();bindApp();});
  document.getElementById("cal-next")?.addEventListener("click",()=>{if(CAL_M===11){CAL_M=0;CAL_Y++;}else CAL_M++;loadSchedule();render();bindApp();});
  
  document.getElementById("refresh-btn")?.addEventListener("click",()=>{ALL_TRENDS=[];render();bindApp();loadAllTrends();});
  
  document.getElementById("connect-calendar-btn")?.addEventListener("click", connectGoogleCalendar);
  
  const doLogout=()=>{if(confirm("Log out of CreatorPulse?")){clearSession();ALL_TRENDS=[];NOTIFICATIONS=[];SCHEDULE_DATA=[];SAVED_POSTS=[];AUTH_FORM={email:"",password:"",confirmPassword:""};AUTH_ERR="";render();}};
  document.getElementById("avatar-btn")?.addEventListener("click",doLogout);
  document.getElementById("logout-btn")?.addEventListener("click",doLogout);
  
  document.getElementById("bell-btn")?.addEventListener("click",e=>{e.stopPropagation();NOTIF_OPEN=!NOTIF_OPEN;render();bindApp();});
  if(NOTIF_OPEN){
    document.addEventListener("click",function closeDD(e){
      if(!e.target.closest("#bell-wrap")){NOTIF_OPEN=false;render();bindApp();}
      document.removeEventListener("click",closeDD);
    },{once:true});
  }
  
  document.querySelectorAll(".tc[id^='tc-']").forEach(cardEl=>{
    const tid=cardEl.id.replace("tc-","");
    bindCard(cardEl,tid);
  });
  
  document.querySelectorAll('.save-output-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const tid = btn.dataset.tid;
      const index = parseInt(btn.dataset.index);
      saveOutputToCalendar(tid, index);
    });
  });
  
  document.querySelectorAll('.cal-export-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      try {
        const post = JSON.parse(btn.dataset.post);
        openGoogleCalendar(post);
      } catch (err) {
        showToast('❌ Error opening calendar');
      }
    });
  });
  
  document.querySelectorAll('.delete-post-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      if (!confirm('Delete this saved post?')) return;
      const postId = btn.dataset.postid;
      try {
        const r = await fetch(`${API}/api/delete-post?token=${AUTH_TOKEN}&postId=${postId}`, { method: 'DELETE' });
        const d = await r.json();
        if (d.success) {
          showToast('🗑️ Post deleted');
          loadSavedPosts();
          loadSchedule();
          if (TAB === 'saved') render();
        } else {
          showToast('❌ Delete failed');
        }
      } catch (e) {
        showToast('❌ Error deleting');
      }
    });
  });
}

async function gen(tid, all) {
  const t=ALL_TRENDS.find(x=>x.id===tid);if(!t)return;
  const ap=AP[tid]||USER.primaryPlatform,at=AT[tid]||PTYPES[ap]?.[0]||"",accent=gc(t.niche);
  LOAD[tid]=true;OUTS[tid]=[];updateSingleCard(tid);
  try{
    const types=all?(PTYPES[ap]||[]):[at];const res=[];
    const subjectImg = await loadSubjectImage(t.headline, t.niche, t.image);
    for(const ct of types){
      if(ct==="IG Carousel"){
        let sc=5;
        try{
          const cr=await generateText('Return ONLY valid JSON: {"slideCount":number}',`Story: "${t.headline}". Recommend Instagram carousel slide count 3-7.`);
          const parsed = extractJSON(cr);
          if(parsed) sc=parsed.slideCount||5;
        }catch{}
        let slides=[];
        try{
          const sr=await generateText(`Return ONLY a valid JSON array of ${sc} objects: [{"slideNum":1,"title":"bold hook","body":"2-3 punchy sentences"}]. No markdown.`,`Create a ${sc}-slide viral Instagram carousel for ${t.niche} creator. Story: "${t.headline}". Summary: ${t.summary}`);
          const parsed = extractJSON(sr);
          if(parsed) slides = Array.isArray(parsed) ? parsed : [parsed];
          else slides = JSON.parse(sr);
        } catch{ slides=[{slideNum:1,title:t.headline,body:t.summary||""}]; }
        const images=slides.map((s,i)=>makeGraphicCanvas(s.title||t.headline,subjectImg,i+1,slides.length,accent,USER.name));
        const cap=await generateText(SYS,`Instagram caption + 10 hashtags for ${t.niche} carousel: "${t.headline}". Punchy, ready to post.`);
        res.push({type:"carousel",slides,images});res.push({type:"text",label:"📝 Caption + Hashtags",content:cap});
      }else if(ct==="Thumbnail"){
        let hl=t.headline.toUpperCase().split(" ").slice(0,5).join(" ");
        try{
          const tr=await generateText('Return ONLY valid JSON: {"headline":"YOUR HEADLINE HERE"}. The headline must be max 6 words, ALL CAPS, directly about the story topic, shocking or curiosity-driving. Think MrBeast thumbnail energy. No generic words like "SHOCKING" or "CRAZY" — be specific to the actual story.',`Niche: ${t.niche}. Story: "${t.headline}". Write the perfect YouTube thumbnail headline for THIS specific story.`);
          const parsed = extractJSON(tr);
          if(parsed && parsed.headline) hl=parsed.headline;
        }catch{}
        res.push({type:"thumbnail",img:makeThumbnailCanvas(hl,subjectImg,USER.name,accent)});
      }else if(ct==="TikTok No-Face Graphic"){
        const hook=await generateText("You are a viral TikTok hook writer. Return ONLY the hook text — max 6 words, ALL CAPS, no punctuation except exclamation marks. The hook must directly reference the actual story topic. Make it shocking, curiosity-driving, or emotional. No random unrelated hooks.",`Story: "${t.headline}". Niche: ${t.niche}. Write the perfect TikTok text hook for this specific story.`);
        const cap=await generateText(SYS,`TikTok caption + 6 hashtags for ${t.niche}: "${t.headline}". Ready to post.`);
        res.push({type:"noface",hook:hook.trim(),caption:cap,img:makeGraphicCanvas(hook.trim()||t.headline,subjectImg,1,1,accent,USER.name)});
      }else if(ct==="TikTok Script"){
        let ld={length:"short",targetSeconds:30,reason:"Quick punchy take"};
        try{
          const lr=await generateText('Return ONLY valid JSON: {"length":"short","targetSeconds":30,"reason":"one sentence"}',`${t.niche}: "${t.headline}". Best TikTok length?`);
          const parsed = extractJSON(lr);
          if(parsed) ld = parsed;
        }catch{}
        const s=await generateText(SYS,`Write a ${ld.length==="long"?"60-90 second":"15-30 second"} TikTok script for a ${t.niche} creator about: "${t.headline}". Write it as continuous spoken narration exactly as the creator would say it on camera, word for word, ready for a teleprompter. Start with the hook line, flow naturally into the body, end with a call to action. Do not use headers, bullets, or labels — just the words to say, as flowing natural speech with paragraph breaks where the creator would naturally pause.`);
        res.push({type:"text",label:`🎵 TikTok Script (${ld.length==="long"?"Long":"Short"} ~${ld.targetSeconds}s) — ${ld.reason}`,content:s});
      }else if(ct==="Documentary Script"){
        const s=await generateText(SYS,`Write a YouTube documentary narration script for a ${t.niche} creator about: "${t.headline}". Write it as continuous spoken narration exactly as a narrator would read it aloud, word for word, ready for a teleprompter, roughly 700-800 words. It should flow as one continuous voiceover covering the opening hook, the background story, the main conflict or development, an analysis of what it means, and a closing thought with a call to action — but written as natural spoken paragraphs, not labeled sections. You may include occasional bracketed visual notes like [show footage of X] sparingly, but the majority of the text must be pure spoken narration.`);
        res.push({type:"text",label:"🎬 Documentary Script",content:s});
      }else if(ct==="Long Form Script"){
        const s=await generateText(SYS,`Write a full YouTube video script for a ${t.niche} creator about: "${t.headline}". Write it as continuous spoken narration exactly as the creator would say it on camera, word for word, ready for a teleprompter, roughly 700-900 words. Open with a strong hook, introduce the topic naturally, cover the main points as flowing spoken paragraphs, and close with a call to action. Do not use headers, bold text, bullet points, or section labels of any kind — just the natural words to say out loud, broken into paragraphs where a speaker would naturally pause for breath or transition.`);
        res.push({type:"text",label:"▶️ Long Form Script",content:s});
      }else if(ct==="YouTube Short Script"){
        const s=await generateText(SYS,`Write a 45-60 second YouTube Shorts script for a ${t.niche} creator about: "${t.headline}". Write it as continuous spoken narration exactly as the creator would say it on camera, word for word, ready for a teleprompter. Open with a 3-second hook that stops the scroll, deliver the core point fast and punchy, end with a strong call to action. Plain spoken paragraphs only — no headers, no JSON, no bullet points, no labels.`);
        res.push({type:"text",label:"▶️ YouTube Short Script",content:s});
      }else if(ct==="Title + Description"){
        const s=await generateText(SYS,`3 YouTube titles + SEO description for ${t.niche}. Topic: "${t.headline}". Titles: clickbait. Description: keywords + hashtags.`);
        res.push({type:"text",label:"▶️ Title + Description",content:s});
      }else if(ct==="Thread (5 tweets)"){
        const s=await generateText(SYS,`Write a viral 5-tweet X thread for a ${t.niche} creator about: "${t.headline}". Format each line exactly as "Tweet 1/5: [text]" through "Tweet 5/5: [text]", max 280 characters each, punchy and natural. Last tweet ends with a call to action. Return ONLY the five tweet lines as plain text — no JSON, no markdown, no extra commentary.`);
        res.push({type:"text",label:"𝕏 Thread",content:s});
      }else if(ct==="IG Reel Script"){
        const s=await generateText(SYS,`Write a 30-60 second Instagram Reel script for a ${t.niche} creator about: "${t.headline}". Write it as continuous spoken narration exactly as the creator would say it on camera, word for word, ready for a teleprompter. Open with a hook, deliver the point, close with a call to action. Plain natural spoken paragraphs only — no headers, no labels, no bullet points.`);
        res.push({type:"text",label:"📸 IG Reel Script",content:s});
      }else{
        const p=PLATS.find(x=>x.id===ap);
        const s=await generateText(SYS,`Write a "${ct}" for a ${t.niche} creator on ${p?.label||ap} about: "${t.headline}". ${t.summary}. Return ONLY the plain ready-to-post text itself — no JSON, no curly braces, no key-value wrapping, no markdown formatting, no quotation marks around the whole thing. Just the raw text exactly as it should be pasted into the post.`);
        res.push({type:"text",label:`${p?.icon||""} ${ct}`,content:s});
      }
    }
    OUTS[tid]=res;
    
    if (res.length > 0 && USER && AUTH_TOKEN) {
      const firstPiece = res[0];
      let contentType = "Script";
      if (firstPiece.type === "carousel") contentType = "Carousel";
      else if (firstPiece.type === "thumbnail") contentType = "Thumbnail";
      else if (firstPiece.type === "noface") contentType = "Graphic";
      
      const today = new Date();
      const year = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, '0');
      const day = String(today.getDate()).padStart(2, '0');
      const scheduledDate = `${year}-${month}-${day}`;
      
      try {
        const saveResponse = await fetch(`${API}/api/save-post`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            token: AUTH_TOKEN,
            headline: t.headline,
            niche: t.niche,
            platform: ap,
            contentType: contentType,
            content: firstPiece,
            scheduledDate: scheduledDate
          })
        });
        const saveResult = await saveResponse.json();
        if (saveResult.success) {
          console.log("✅ Post auto-saved to calendar!");
          showToast("✅ Content saved to calendar!");
          if (TAB === "calendar") loadSchedule();
          if (TAB === "saved") loadSavedPosts();
        } else {
          console.log("Save failed:", saveResult.error);
        }
      } catch(e) { console.log("Save error:", e); }
    }
    
  }catch(e){OUTS[tid]=[{type:"text",label:"Error",content:"Generation failed: "+(e.message||"Unknown error")+"\n\nCheck that your Groq API key is set correctly in Render's environment variables."}];}
  LOAD[tid]=false;updateSingleCard(tid);
}

(function boot(){
  const restored = restoreSession();
  if(restored){
    AUTH_MODE="app";
    render();
    loadAllTrends();
    loadNotifications();
    loadSchedule();
    loadSavedPosts();
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(() => console.log('Service Worker registered'))
        .catch(err => console.log('SW registration failed:', err));
    }
    setInterval(() => {
      if (AUTH_MODE === "app") {
        loadAllTrends();
        loadNotifications();
        if (TAB === "calendar") loadSchedule();
        if (TAB === "saved") loadSavedPosts();
      }
    }, 120000);
  } else {
    AUTH_MODE="landing";
    render();
  }
})();
</script>
